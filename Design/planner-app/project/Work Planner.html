<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Space+Grotesk:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Planner — design tokens & component styles
   Clean & modern, subtle pastels. Light + dark.
   ============================================================ */

:root {
  /* type */
  --font: "Roboto", -apple-system, system-ui, sans-serif;

  /* neutral ramp — warm beige, pastel */
  --bg:        oklch(0.955 0.013 79);
  --surface:   oklch(0.99 0.007 80);
  --surface-2: oklch(0.945 0.014 78);
  --line:      oklch(0.885 0.016 76);
  --line-soft: oklch(0.915 0.014 77);
  --ink:       oklch(0.32 0.022 72);
  --ink-2:     oklch(0.49 0.022 72);
  --ink-3:     oklch(0.63 0.02 73);

  /* accent — only --accent is set at runtime; rest derived */
  --accent:      #6C72E0;
  --accent-ink:  color-mix(in oklab, var(--accent), black 26%);
  --accent-soft: color-mix(in oklab, var(--accent) 16%, oklch(0.975 0.012 82));
  --accent-on:   #fff;

  /* status */
  --amber:       oklch(0.78 0.115 70);
  --amber-ink:   oklch(0.54 0.11 58);
  --amber-soft:  oklch(0.93 0.055 78);
  --red:         oklch(0.66 0.16 22);
  --red-ink:     oklch(0.54 0.17 22);
  --red-soft:    oklch(0.93 0.045 26);
  --green:       oklch(0.7 0.1 150);
  --green-soft:  oklch(0.93 0.05 150);

  /* radii */
  --r-xs: 7px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;

  /* shadow */
  --sh-1: 0 1px 2px rgba(30,32,60,0.05), 0 1px 3px rgba(30,32,60,0.04);
  --sh-2: 0 2px 6px rgba(30,32,60,0.06), 0 6px 18px rgba(30,32,60,0.06);
  --sh-3: 0 12px 30px rgba(30,32,60,0.12), 0 4px 10px rgba(30,32,60,0.06);
  --sh-pop: 0 24px 60px rgba(20,22,50,0.22), 0 6px 16px rgba(20,22,50,0.12);
}

.surface.dark {
  --bg:        oklch(0.21 0.012 275);
  --surface:   oklch(0.255 0.014 275);
  --surface-2: oklch(0.29 0.014 275);
  --line:      oklch(0.34 0.014 275);
  --line-soft: oklch(0.31 0.012 275);
  --ink:       oklch(0.95 0.01 275);
  --ink-2:     oklch(0.76 0.015 275);
  --ink-3:     oklch(0.6 0.015 275);
  --accent-soft: color-mix(in oklab, var(--accent) 24%, var(--surface));
  --accent-ink:  color-mix(in oklab, var(--accent), white 38%);
  --amber-soft:  oklch(0.36 0.06 75);
  --red-soft:    oklch(0.35 0.08 25);
  --green-soft:  oklch(0.34 0.05 155);
  --sh-1: 0 1px 2px rgba(0,0,0,0.3);
  --sh-2: 0 2px 8px rgba(0,0,0,0.35);
  --sh-3: 0 14px 34px rgba(0,0,0,0.5);
  --sh-pop: 0 30px 70px rgba(0,0,0,0.6);
}

* { box-sizing: border-box; }

.surface {
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  height: 100%;
  width: 100%;
  display: flex;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
}
.surface, .surface * { font-family: var(--font); }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; }

/* ---------- scrollbars ---------- */
.scroll { overflow-y: auto; overflow-x: hidden; }
.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
.scroll::-webkit-scrollbar-thumb:hover { background: var(--ink-3); background-clip: content-box; }

/* ============================================================
   DESKTOP shell — sidebar + main
   ============================================================ */
.desktop .sidebar {
  width: 248px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 22px 14px 16px;
  gap: 4px;
}
.brand { display: flex; align-items: center; gap: 11px; padding: 2px 10px 18px; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--accent); color: var(--accent-on);
  display: grid; place-items: center; flex-shrink: 0;
  box-shadow: var(--sh-1);
}
.brand-name { font-weight: 700; font-size: 17px; letter-spacing: -0.02em; white-space: nowrap; }
.brand-sub { font-size: 11.5px; color: var(--ink-3); font-weight: 500; margin-top: 1px; white-space: nowrap; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 11px; border-radius: var(--r-sm);
  font-size: 14.5px; font-weight: 550; color: var(--ink-2);
  text-align: left; width: 100%; transition: background .12s, color .12s;
}
.nav-item svg { width: 19px; height: 19px; }
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
.nav-item .count { margin-left: auto; font-size: 12px; font-weight: 600; color: var(--ink-3); }
.nav-item.active .count { color: var(--accent-ink); }

.nav-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); padding: 16px 11px 6px; }

.cat-row { display: flex; align-items: center; gap: 11px; padding: 8px 11px; border-radius: var(--r-sm); font-size: 14px; font-weight: 550; color: var(--ink-2); width: 100%; text-align: left; }
.cat-row:hover { background: var(--surface-2); }
.cat-row.active { background: var(--surface-2); color: var(--ink); }
.cat-dot { width: 11px; height: 11px; border-radius: 4px; flex-shrink: 0; }
.cat-row .count { margin-left: auto; font-size: 12px; color: var(--ink-3); font-weight: 600; }

.sidebar-foot { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--r-md); background: var(--surface-2); }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--accent-on); display: grid; place-items: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }

/* ---------- topbar ---------- */
.topbar { display: flex; align-items: center; gap: 14px; padding: 20px 30px 14px; }
.page-title { font-size: 25px; font-weight: 700; letter-spacing: -0.025em; }
.page-sub { font-size: 13px; color: var(--ink-3); font-weight: 500; margin-top: 2px; white-space: nowrap; }
.topbar-spacer { flex: 1; }

.search {
  display: flex; align-items: center; gap: 9px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: 8px 13px; width: 240px;
  color: var(--ink-3);
}
.search input { border: none; background: none; outline: none; flex: 1; font-size: 13.5px; color: var(--ink); min-width: 0; }
.search input::placeholder { color: var(--ink-3); }

.icon-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  display: grid; place-items: center; color: var(--ink-2);
  background: var(--surface); border: 1px solid var(--line);
  transition: background .12s, color .12s;
}
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.icon-btn svg { width: 18px; height: 18px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 15px; border-radius: var(--r-md);
  font-size: 14px; font-weight: 600; transition: transform .08s, filter .12s, background .12s;
}
.btn:active { transform: translateY(1px); }
.btn { white-space: nowrap; }
.btn-primary { background: var(--accent); color: var(--accent-on); box-shadow: var(--sh-1); }
.btn-primary:hover { filter: brightness(1.05); }
.btn-ghost { background: var(--surface); border: 1px solid var(--line); color: var(--ink); }
.btn-ghost:hover { background: var(--surface-2); }
.btn svg { width: 16px; height: 16px; }

/* ---------- toolbar (filters/sort) ---------- */
.toolbar { display: flex; align-items: center; gap: 10px; padding: 6px 30px 14px; flex-wrap: wrap; }
.seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 3px; gap: 2px; }
.seg button { padding: 6px 13px; border-radius: 9px; font-size: 13px; font-weight: 600; color: var(--ink-2); display: inline-flex; align-items: center; gap: 6px; transition: color .12s; }
.seg button svg { width: 15px; height: 15px; }
.seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--sh-1); }
.chip-toggle { padding: 7px 13px; border-radius: 99px; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); }
.chip-toggle.on { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }

.content { flex: 1; min-height: 0; }
.content-pad { padding: 4px 30px 40px; }

/* ============================================================
   TASK CARD / ROW
   ============================================================ */
.task-group-head { display: flex; align-items: center; gap: 9px; margin: 22px 2px 11px; }
.task-group-head:first-child { margin-top: 6px; }
.task-group-title { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink-2); }
.task-group-count { font-size: 12px; font-weight: 600; color: var(--ink-3); background: var(--surface-2); padding: 1px 9px; border-radius: 99px; }
.task-group-line { flex: 1; height: 1px; background: var(--line-soft); }

.tasklist { display: flex; flex-direction: column; gap: 10px; }
.tasklist.rows { gap: 0; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--sh-1); }

/* desktop: lay cards/grouped lists out in two columns */
.desktop .tasklist:not(.rows) {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  align-items: start;
  gap: 12px;
}
@media (max-width: 840px) {
  .desktop .tasklist:not(.rows) { grid-template-columns: 1fr; }
}

.task {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 15px 17px;
  box-shadow: var(--sh-1); transition: box-shadow .14s, border-color .14s, transform .08s;
  position: relative;
}
.task:hover { box-shadow: var(--sh-2); border-color: var(--line); }
.rows .task { border-radius: 0; border: none; border-bottom: 1px solid var(--line-soft); box-shadow: none; padding: 14px 18px; }
.rows .task:last-child { border-bottom: none; }
.rows .task:hover { background: var(--surface-2); box-shadow: none; }
.task.done { opacity: 0.62; }
.task.overdue { border-left: 3px solid var(--red); }
.task.due-soon { border-left: 3px solid var(--amber); }
.rows .task.overdue, .rows .task.due-soon { border-left-width: 3px; border-left-style: solid; }

.task-main { display: flex; align-items: flex-start; gap: 13px; }

/* round checkbox */
.check {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
  border: 2px solid var(--line); background: var(--surface);
  display: grid; place-items: center; color: #fff; transition: background .14s, border-color .14s, transform .1s;
}
.check svg { width: 13px; height: 13px; opacity: 0; transform: scale(0.5); transition: opacity .12s, transform .14s; }
.check:hover { border-color: var(--accent); }
.check.on { background: var(--green); border-color: var(--green); }
.check.on svg { opacity: 1; transform: scale(1); }
.check.sm { width: 18px; height: 18px; }
.check.sm svg { width: 11px; height: 11px; }

.task-body { flex: 1; min-width: 0; }
.task-titlerow { display: flex; align-items: center; gap: 9px; }
.task-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.35; color: var(--ink); }
.task.done .task-title { text-decoration: line-through; text-decoration-color: var(--ink-3); }
.task-notes { font-size: 13px; color: var(--ink-3); margin-top: 3px; line-height: 1.45; }

.meta-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 650;
}
.chip svg { width: 12px; height: 12px; }
.chip-cat { /* colors injected inline */ }
.chip-date { background: var(--surface-2); color: var(--ink-2); }
.chip-date.due-soon { background: var(--amber-soft); color: var(--amber-ink); }
.chip-date.overdue { background: var(--red-soft); color: var(--red-ink); }
.chip-attach { background: var(--surface-2); color: var(--ink-2); }
.chip-recur { background: var(--surface-2); color: var(--ink-2); }

.flag { width: 8px; height: 8px; border-radius: 2.5px; flex-shrink: 0; }
.flag.high { background: var(--red); }
.flag.med  { background: var(--amber); }
.flag.low  { background: var(--ink-3); }
.flag-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 650; color: var(--ink-2); }

/* progress */
.progress { display: flex; align-items: center; gap: 9px; margin-top: 11px; }
.bar { flex: 1; height: 6px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
.bar > span { display: block; height: 100%; border-radius: 99px; background: var(--accent); transition: width .35s cubic-bezier(.4,0,.2,1); }
.bar.full > span { background: var(--green); }
.progress-num { font-size: 11.5px; font-weight: 650; color: var(--ink-3); min-width: 30px; text-align: right; }

/* subtasks */
.subtasks { margin-top: 12px; padding-top: 11px; border-top: 1px dashed var(--line); display: flex; flex-direction: column; gap: 2px; margin-left: 35px; }
.subtask { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
.subtask-title { font-size: 13.5px; color: var(--ink-2); flex: 1; }
.subtask.done .subtask-title { text-decoration: line-through; color: var(--ink-3); }
.subtask-date { font-size: 11px; font-weight: 600; color: var(--ink-3); }
.subtask-date.due-soon { color: var(--amber-ink); }
.subtask-date.overdue { color: var(--red-ink); }
.subtask-toggle { display: inline-flex; align-items: center; gap: 6px; margin-top: 9px; margin-left: 35px; font-size: 12.5px; font-weight: 600; color: var(--accent-ink); }
.subtask-toggle svg { width: 14px; height: 14px; transition: transform .18s; }
.subtask-toggle.open svg { transform: rotate(90deg); }
.add-sub { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-3); font-weight: 600; padding: 5px 0; margin-left: 0; }
.add-sub:hover { color: var(--accent-ink); }

.task-actions { display: flex; gap: 3px; align-items: center; opacity: 0; transition: opacity .12s; }
.task:hover .task-actions { opacity: 1; }
.mini-btn { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; color: var(--ink-3); }
.mini-btn:hover { background: var(--surface-2); color: var(--ink); }
.mini-btn svg { width: 16px; height: 16px; }

/* ============================================================
   CALENDAR
   ============================================================ */
.cal-head { display: flex; align-items: center; gap: 14px; padding: 4px 30px 16px; }
.cal-month { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; min-width: 178px; }
.cal-nav { display: flex; gap: 6px; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 0; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--sh-1); }
.cal-dow { padding: 11px 12px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); border-bottom: 1px solid var(--line); text-align: left; }
.cal-cell { min-width: 0; min-height: 116px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); padding: 8px; display: flex; flex-direction: column; gap: 5px; position: relative; transition: background .12s; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.out { background: var(--surface-2); }
.cal-cell:hover { background: var(--surface-2); }
.cal-daynum { font-size: 13px; font-weight: 650; color: var(--ink-2); width: 25px; height: 25px; display: grid; place-items: center; border-radius: 50%; }
.cal-cell.out .cal-daynum { color: var(--ink-3); }
.cal-cell.today .cal-daynum { background: var(--accent); color: var(--accent-on); }
.cal-event { font-size: 11.5px; font-weight: 600; padding: 3px 7px; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; line-height: 1.3; }
.cal-event .ev-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
.cal-event.done { opacity: 0.5; text-decoration: line-through; }
.cal-event.overdue { background: var(--red-soft); color: var(--red-ink); }
.cal-more { font-size: 10.5px; font-weight: 600; color: var(--ink-3); padding-left: 7px; }

/* agenda */
.agenda { display: flex; flex-direction: column; gap: 2px; }
.agenda-day { display: flex; gap: 18px; padding: 14px 0; border-bottom: 1px solid var(--line-soft); }
.agenda-date { width: 86px; flex-shrink: 0; text-align: right; }
.agenda-dow { font-size: 12px; font-weight: 650; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.03em; }
.agenda-num { font-size: 27px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-top: 3px; }
.agenda-day.today .agenda-num { color: var(--accent-ink); }
.agenda-items { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }

/* timeline */
.timeline { display: flex; flex-direction: column; }
.tl-row { display: grid; grid-template-columns: 92px 1fr; gap: 16px; padding: 7px 0; align-items: center; }
.tl-label { text-align: right; font-size: 12.5px; font-weight: 650; color: var(--ink-3); }
.tl-track { position: relative; height: 34px; background: var(--surface-2); border-radius: 99px; }
.tl-bar { position: absolute; top: 5px; height: 24px; border-radius: 99px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; font-weight: 650; color: #fff; white-space: nowrap; overflow: hidden; box-shadow: var(--sh-1); }
.tl-scale { display: grid; grid-template-columns: 92px 1fr; gap: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--line); margin-bottom: 6px; }
.tl-scale-inner { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--ink-3); }

/* ============================================================
   STATS row
   ============================================================ */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 4px 30px 8px; }
.stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px; box-shadow: var(--sh-1); }
.stat-num { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.stat-label { font-size: 12px; color: var(--ink-3); font-weight: 600; margin-top: 6px; }
.stat.amber .stat-num { color: var(--amber-ink); }
.stat.red .stat-num { color: var(--red-ink); }
.stat.green .stat-num { color: var(--green); }

/* ============================================================
   MODAL / editor
   ============================================================ */
.scrim { position: absolute; inset: 0; background: rgba(20,22,45,0.42); backdrop-filter: blur(3px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fade .15s ease; }
.mobile .scrim { align-items: flex-end; padding: 0; }
@keyframes fade { from { opacity: 0; } }
@keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.98); } }
@keyframes sheet { from { transform: translateY(100%); } }

.modal { background: var(--surface); border-radius: var(--r-xl); width: 540px; max-width: 100%; max-height: 90%; display: flex; flex-direction: column; box-shadow: var(--sh-pop); animation: pop .18s cubic-bezier(.2,.7,.3,1); overflow: hidden; }
.mobile .modal { width: 100%; border-radius: 26px 26px 0 0; max-height: 92%; animation: sheet .26s cubic-bezier(.2,.7,.3,1); }
.modal-head { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
.modal-head h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; flex: 1; }
.modal-body { padding: 18px 20px; gap: 16px; display: flex; flex-direction: column; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: space-between; align-items: center; }

.field { display: flex; flex-direction: column; gap: 7px; }
.field-label { font-size: 12px; font-weight: 700; color: var(--ink-2); letter-spacing: 0.01em; }
.input, .textarea, .select {
  width: 100%; background: var(--surface-2); border: 1.5px solid var(--line);
  border-radius: var(--r-md); padding: 11px 13px; font-size: 14.5px; color: var(--ink);
  outline: none; transition: border-color .12s, background .12s;
}
.input::placeholder, .textarea::placeholder { color: var(--ink-3); }
.input:focus, .textarea:focus, .select:focus { border-color: var(--accent); background: var(--surface); }
.input.title-input { font-size: 17px; font-weight: 600; }
.textarea { resize: none; min-height: 60px; line-height: 1.5; }
.field-row { display: flex; gap: 12px; }
.field-row > .field { flex: 1; }

.opt-row { display: flex; gap: 8px; flex-wrap: wrap; }
.opt {
  padding: 8px 13px; border-radius: var(--r-md); font-size: 13px; font-weight: 600;
  background: var(--surface-2); border: 1.5px solid var(--line); color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 7px;
}
.opt:hover { border-color: var(--ink-3); }
.opt.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.opt .flag { width: 9px; height: 9px; }
.opt .cat-dot { width: 9px; height: 9px; }

.sub-edit { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: var(--r-sm); background: var(--surface-2); }
.sub-edit input { flex: 1; border: none; background: none; outline: none; font-size: 14px; color: var(--ink); }
.sub-edit .sub-date-btn { font-size: 11.5px; font-weight: 600; color: var(--ink-3); padding: 4px 8px; border-radius: 7px; background: var(--surface); border: 1px solid var(--line); }
.sub-edit .sub-date-btn.set { color: var(--accent-ink); }

.attach-list { display: flex; flex-direction: column; gap: 8px; }
.attach { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--r-md); background: var(--surface-2); border: 1px solid var(--line); }
.attach-ic { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; }
.attach-ic.file { background: var(--accent-soft); color: var(--accent-ink); }
.attach-ic.link { background: var(--green-soft); color: var(--green); }
.attach-ic.image { background: var(--amber-soft); color: var(--amber-ink); }
.attach-ic svg { width: 17px; height: 17px; }
.attach-name { font-size: 13.5px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.attach-meta { font-size: 11.5px; color: var(--ink-3); }
.add-attach-row { display: flex; gap: 8px; }

/* image placeholder (striped) */
.img-ph { border-radius: var(--r-md); border: 1px solid var(--line); background-color: var(--surface-2);
  background-image: repeating-linear-gradient(45deg, transparent, transparent 9px, var(--line-soft) 9px, var(--line-soft) 18px);
  display: grid; place-items: center; color: var(--ink-3); font-family: ui-monospace, monospace; font-size: 11px; }

/* ============================================================
   MOBILE shell
   ============================================================ */
.mobile { flex-direction: column; background: var(--bg); }
.m-header { padding: max(env(safe-area-inset-top), 18px) 18px 10px; display: flex; align-items: flex-end; gap: 12px; }
.m-title { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; white-space: nowrap; }
.m-sub { font-size: 12.5px; color: var(--ink-3); font-weight: 500; margin-top: 3px; white-space: nowrap; }
.m-header-spacer { flex: 1; }
.m-content { flex: 1; min-height: 0; padding: 0 16px 12px; }
.m-search { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 10px 13px; margin: 0 16px 12px; color: var(--ink-3); }
.m-search input { border: none; background: none; outline: none; flex: 1; font-size: 14px; color: var(--ink); min-width: 0; }

.m-filters { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
.m-filters::-webkit-scrollbar { display: none; }
.m-chip { padding: 7px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; white-space: nowrap; background: var(--surface); border: 1px solid var(--line); color: var(--ink-2); display: inline-flex; align-items: center; gap: 7px; flex-shrink: 0; }
.m-chip.on { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.m-chip .cat-dot { width: 9px; height: 9px; }

/* mobile stat strip */
.m-stats { display: flex; gap: 9px; padding: 0 16px 14px; }
.m-stat { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 11px 12px; box-shadow: var(--sh-1); }
.m-stat-num { font-size: 21px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.m-stat-label { font-size: 10.5px; color: var(--ink-3); font-weight: 600; margin-top: 5px; }
.m-stat.amber .m-stat-num { color: var(--amber-ink); }
.m-stat.red .m-stat-num { color: var(--red-ink); }

/* bottom tabbar */
.tabbar { display: flex; padding: 8px 14px max(env(safe-area-inset-bottom), 14px); background: var(--surface); border-top: 1px solid var(--line); gap: 4px; position: relative; flex-shrink: 0; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; color: var(--ink-3); font-size: 10.5px; font-weight: 650; }
.tab svg { width: 23px; height: 23px; }
.tab.active { color: var(--accent-ink); }
.fab-wrap { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); }
.fab { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: var(--accent-on); display: grid; place-items: center; box-shadow: var(--sh-3); transition: transform .1s; }
.fab:active { transform: scale(0.94); }
.fab svg { width: 26px; height: 26px; }

/* mobile calendar tweaks */
.mobile .cal-cell { min-height: 0; aspect-ratio: 1; padding: 4px; align-items: center; gap: 2px; }
.mobile .cal-daynum { font-size: 12px; width: 26px; height: 26px; }
.mobile .cal-dots { display: flex; gap: 3px; }
.mobile .cal-dots .ev-dot { width: 5px; height: 5px; border-radius: 99px; }
.mobile .cal-dow { padding: 8px 0; text-align: center; font-size: 10px; }

/* empty state */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--ink-3); gap: 12px; }
.empty-ic { width: 56px; height: 56px; border-radius: 18px; background: var(--surface-2); display: grid; place-items: center; color: var(--ink-3); }
.empty-ic svg { width: 26px; height: 26px; }
.empty h4 { font-size: 16px; font-weight: 650; color: var(--ink-2); }
.empty p { font-size: 13.5px; max-width: 280px; line-height: 1.5; }

/* day detail popover for calendar */
.day-detail { position: absolute; z-index: 100; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-pop); width: 280px; padding: 14px; }
.day-detail h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }

/* ============================================================
   SHOWCASE stage (side-by-side frames)
   ============================================================ */
.stage { position: fixed; inset: 0; background:
   radial-gradient(1200px 700px at 20% -10%, oklch(0.94 0.03 120), transparent),
   radial-gradient(1000px 600px at 100% 110%, oklch(0.94 0.035 70), transparent),
   oklch(0.945 0.014 80);
  overflow: auto; }
.stage-inner { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 40px; transform-origin: center center; }
.frames { display: flex; align-items: center; gap: 56px; }
.frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.frame-label { font-size: 13px; font-weight: 650; color: oklch(0.45 0.02 270); letter-spacing: 0.01em; display: flex; align-items: center; gap: 8px; }
.frame-label .dotpair { display: flex; gap: 4px; }
.frame-label .dotpair i { width: 7px; height: 7px; border-radius: 99px; background: oklch(0.7 0.02 270); }

.stage-hint { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); font-size: 12px; color: oklch(0.5 0.02 270); background: rgba(255,255,255,0.7); backdrop-filter: blur(6px); padding: 7px 15px; border-radius: 99px; font-weight: 550; box-shadow: var(--sh-1); z-index: 10; }

/* ============================================================
   SKINS — alternate design directions (toggle via Tweaks)
   skin-sage = default look, no overrides needed.
   ============================================================ */

/* ---------- Paper · journal: serif, cream, ruled, flat ---------- */
.surface.skin-paper {
  --font: "Lora", Georgia, serif;
  --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 10px; --r-xl: 14px;
  --sh-1: none; --sh-2: 0 2px 8px rgba(80,60,20,0.07);
}
.surface.skin-paper:not(.dark) {
  --bg:        oklch(0.962 0.024 92);
  --surface:   oklch(0.985 0.013 95);
  --surface-2: oklch(0.945 0.024 90);
  --line:      oklch(0.868 0.03 85);
  --line-soft: oklch(0.905 0.026 88);
  --ink:       oklch(0.3 0.038 65);
  --ink-2:     oklch(0.46 0.036 65);
  --ink-3:     oklch(0.6 0.03 68);
  --accent-soft: color-mix(in oklab, var(--accent) 15%, oklch(0.97 0.02 92));
}
.surface.skin-paper.dark {
  --bg:        oklch(0.215 0.018 75);
  --surface:   oklch(0.26 0.02 75);
  --surface-2: oklch(0.295 0.02 75);
  --line:      oklch(0.35 0.02 75);
  --line-soft: oklch(0.32 0.018 75);
}
.skin-paper .page-title, .skin-paper .m-title, .skin-paper .cal-month,
.skin-paper .brand-name, .skin-paper .agenda-num, .skin-paper .modal-head h3,
.skin-paper .stat-num, .skin-paper .m-stat-num { font-style: italic; letter-spacing: 0; }
.skin-paper .nav-label, .skin-paper .task-group-title { letter-spacing: 0.09em; }
.skin-paper .task, .skin-paper .stat, .skin-paper .m-stat, .skin-paper .cal-grid, .skin-paper .tasklist.rows { box-shadow: none; }
.skin-paper .subtasks { border-top-style: dotted; }
.skin-paper .check { border-radius: 50%; }

/* ---------- Editorial · inky, sharp, print-like ---------- */
.surface.skin-editorial {
  --font: "Space Grotesk", sans-serif;
  --r-xs: 2px; --r-sm: 3px; --r-md: 5px; --r-lg: 7px; --r-xl: 10px;
  --sh-1: none;
  --sh-2: 3px 3px 0 color-mix(in oklab, var(--ink) 14%, transparent);
  --sh-3: 5px 5px 0 color-mix(in oklab, var(--ink) 16%, transparent);
}
.surface.skin-editorial:not(.dark) {
  --bg:        oklch(0.972 0.008 85);
  --surface:   oklch(0.995 0.004 90);
  --surface-2: oklch(0.955 0.008 85);
  --line:      oklch(0.79 0.014 80);
  --line-soft: oklch(0.885 0.012 82);
  --ink:       oklch(0.23 0.014 75);
  --ink-2:     oklch(0.42 0.016 75);
  --ink-3:     oklch(0.58 0.016 76);
}
.surface.skin-editorial.dark {
  --bg:        oklch(0.2 0.005 80);
  --surface:   oklch(0.245 0.006 80);
  --surface-2: oklch(0.285 0.006 80);
  --line:      oklch(0.38 0.006 80);
  --line-soft: oklch(0.32 0.006 80);
}
.skin-editorial .page-title, .skin-editorial .m-title, .skin-editorial .cal-month, .skin-editorial .brand-name { text-transform: uppercase; letter-spacing: 0.02em; }
.skin-editorial .chip, .skin-editorial .chip-toggle, .skin-editorial .m-chip, .skin-editorial .task-group-count { border-radius: 4px; }
.skin-editorial .check, .skin-editorial .cal-daynum { border-radius: 6px; }
.skin-editorial .check.sm { border-radius: 5px; }
.skin-editorial .task:hover { transform: translate(-1px, -1px); }
.skin-editorial .btn-primary { box-shadow: 2px 2px 0 color-mix(in oklab, var(--ink) 30%, transparent); }
.skin-editorial .fab { border-radius: 16px; box-shadow: 3px 3px 0 color-mix(in oklab, var(--ink) 25%, transparent); }
.skin-editorial .bar, .skin-editorial .bar > span { border-radius: 2px; }

/* ---------- Candy · blush pastel, extra round, chunky ---------- */
.surface.skin-candy {
  --font: "Nunito", sans-serif;
  --r-xs: 10px; --r-sm: 13px; --r-md: 17px; --r-lg: 24px; --r-xl: 32px;
}
.surface.skin-candy:not(.dark) {
  --bg:        oklch(0.962 0.021 345);
  --surface:   oklch(0.995 0.005 340);
  --surface-2: oklch(0.953 0.019 342);
  --line:      oklch(0.89 0.026 340);
  --line-soft: oklch(0.92 0.022 340);
  --ink:       oklch(0.33 0.045 330);
  --ink-2:     oklch(0.5 0.04 330);
  --ink-3:     oklch(0.64 0.032 332);
  --accent-soft: color-mix(in oklab, var(--accent) 15%, oklch(0.975 0.012 345));
}
.surface.skin-candy.dark {
  --bg:        oklch(0.215 0.022 330);
  --surface:   oklch(0.26 0.024 330);
  --surface-2: oklch(0.295 0.024 330);
  --line:      oklch(0.35 0.024 330);
  --line-soft: oklch(0.32 0.022 330);
}
.skin-candy .task { border-width: 1.5px; }
.skin-candy .task-title, .skin-candy .btn, .skin-candy .chip, .skin-candy .nav-item, .skin-candy .tab { font-weight: 700; }
.skin-candy .check { border-width: 2.5px; }
.skin-candy .brand-mark { border-radius: 12px; }
.skin-candy .bar { height: 8px; }
.skin-candy .avatar, .skin-candy .cat-dot { border-radius: 50%; }

/* ============================================================
   Studio · card-based, rounded, friendly (reference look)
   warm cream base, soft peach hero, circular progress rings
   ============================================================ */
.surface.skin-studio {
  --font: "Poppins", -apple-system, system-ui, sans-serif;
  --r-xs: 9px; --r-sm: 12px; --r-md: 15px; --r-lg: 20px; --r-xl: 26px;
  --sh-1: 0 1px 2px rgba(18,24,38,0.05), 0 1px 3px rgba(18,24,38,0.05);
  --sh-2: 0 2px 4px rgba(18,24,38,0.04), 0 6px 16px rgba(18,24,38,0.08);
  --sh-3: 0 12px 32px rgba(18,24,38,0.12);
  --sh-pop: 0 24px 60px rgba(18,24,38,0.22), 0 6px 18px rgba(18,24,38,0.12);
}
.surface.skin-studio:not(.dark) {
  --bg:        oklch(0.976 0.0015 250);
  --surface:   oklch(1 0 0);
  --surface-2: oklch(0.965 0.002 250);
  --line:      oklch(0.912 0.003 250);
  --line-soft: oklch(0.945 0.0025 250);
  --ink:       oklch(0.27 0.012 258);
  --ink-2:     oklch(0.46 0.011 258);
  --ink-3:     oklch(0.62 0.009 258);
  --accent-soft: color-mix(in oklab, var(--accent) 13%, oklch(0.99 0 0));
}
.surface.skin-studio.dark {
  --bg:        oklch(0.04 0 0);
  --surface:   oklch(0.165 0.006 280);
  --surface-2: oklch(0.225 0.008 280);
  --line:      oklch(0.32 0.012 280);
  --line-soft: oklch(0.26 0.01 280);
  --sh-1: 0 1px 2px rgba(0,0,0,0.6);
  --sh-2: 0 6px 20px rgba(0,0,0,0.7);
  --sh-3: 0 16px 40px rgba(0,0,0,0.8);
}
/* elevate & outline cards so they read on pure black */
.skin-studio.dark .status-row,
.skin-studio.dark .task,
.skin-studio.dark .cal-grid,
.skin-studio.dark .stat,
.skin-studio.dark .tasklist.rows {
  border-color: oklch(0.3 0.012 280);
  box-shadow: 0 1px 0 oklch(0.26 0.01 280) inset, 0 4px 16px rgba(0,0,0,0.55);
}
.skin-studio.dark .project-card { background: color-mix(in oklab, var(--pc) 26%, oklch(0.2 0.008 280)); border-color: color-mix(in oklab, var(--pc) 34%, oklch(0.34 0.01 280)); }
.skin-studio.dark .proj-pct,
.skin-studio.dark .proj-name { color: oklch(0.96 0.01 280); }
.skin-studio.dark .proj-meta { color: oklch(0.74 0.012 280); }

/* softer, friendlier shared bits */
.skin-studio .nav-item.active { border-radius: 99px; }
.skin-studio .nav-item { border-radius: 99px; }
.skin-studio .chip, .skin-studio .m-chip, .skin-studio .chip-toggle { border-radius: 99px; }
.skin-studio .seg { border-radius: 99px; }
.skin-studio .seg button { border-radius: 99px; }
.skin-studio .btn { border-radius: 99px; }
.skin-studio .task-title { font-weight: 600; }
.skin-studio .page-title, .skin-studio .m-title, .skin-studio .brand-name,
.skin-studio .cal-month, .skin-studio .hero-name { letter-spacing: -0.02em; }
.skin-studio .icon-btn { border-radius: 50%; }
.skin-studio .brand-mark { border-radius: 12px; }

/* ---- circular ring ---- */
.ring { position: relative; display: grid; place-items: center; flex-shrink: 0; }
.ring-svg { display: block; }
.ring-label { position: absolute; inset: 0; display: grid; place-items: center; }

/* ---- dashboard wrapper ---- */
.studio-dash { display: flex; flex-direction: column; }
.dash-sec-head { font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-3); margin: 26px 2px 12px; }
.dash-sec-head.sched { display: flex; align-items: center; }
.studio-dash + * .task-group-head:first-child,
.studio-dash ~ * { }

/* ---- hero card ---- */
.hero {
  position: relative; overflow: hidden;
  border-radius: var(--r-xl);
  padding: 18px 22px 18px;
  color: #fff;
  background: #708871;
  box-shadow: var(--sh-2);
}
.hero::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(130% 150% at 100% 0%, rgba(255,255,255,0.16), transparent 55%);
}
.skin-studio.dark .hero {
  color: oklch(0.97 0.015 150);
  background: oklch(0.46 0.05 150);
}
.hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; opacity: 0.82; }
.hero-eyebrow svg { width: 14px; height: 14px; }
.hero-btn { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: inherit; background: rgba(255,255,255,0.35); }
.hero-btn:hover { background: rgba(255,255,255,0.5); }
.skin-studio.dark .hero-btn { background: rgba(255,255,255,0.14); }

.hero-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.hero-id { display: flex; align-items: center; gap: 14px; min-width: 0; }
.hero-av {
  width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center; font-weight: 700; font-size: 18px;
  color: #fff; background: rgba(255,255,255,0.22);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.18);
}
.hero-name { font-size: 21px; font-weight: 700; line-height: 1.1; }
.hero-role { font-size: 13px; font-weight: 500; opacity: 0.78; margin-top: 2px; }
.hero-pct { font-size: 17px; font-weight: 700; color: #fff; }
.hero-pct i { font-size: 11px; font-style: normal; font-weight: 600; opacity: 0.85; }
.hero-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.32); font-size: 13px; font-weight: 500; }
.hero-foot b { font-weight: 700; }
.hero-add { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 650; color: oklch(0.4 0.06 150); background: #fff; padding: 7px 14px; border-radius: 99px; }
.hero-add:hover { background: rgba(255,255,255,0.88); }
.hero-add svg { width: 15px; height: 15px; }
.hero-actions { display: inline-flex; align-items: center; gap: 8px; }
.hero-ai { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 650; color: #fff; background: rgba(255,255,255,0.22); padding: 7px 14px; border-radius: 99px; transition: background .12s; }
.hero-ai:hover { background: rgba(255,255,255,0.34); }
.hero-ai svg { width: 15px; height: 15px; }
.hero-ai[disabled] { opacity: 0.7; cursor: default; }
.skin-studio.dark .hero-ai { background: rgba(255,255,255,0.14); }

.hero-ai-panel {
  margin-top: 14px; padding: 14px 16px; border-radius: var(--r-lg);
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.26);
  color: #fff; font-size: 13.5px; line-height: 1.55; animation: fade .2s;
}
.skin-studio.dark .hero-ai-panel { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.16); }
.hero-ai-head { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.85; margin-bottom: 9px; }
.hero-ai-head svg { width: 14px; height: 14px; }
.hero-ai-head .hero-ai-close { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; color: inherit; background: rgba(255,255,255,0.18); }
.hero-ai-head .hero-ai-close:hover { background: rgba(255,255,255,0.3); }
.hero-ai-body { white-space: pre-wrap; }
.hero-ai-loading { display: flex; align-items: center; gap: 10px; opacity: 0.9; }
.ai-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; animation: aispin .7s linear infinite; }
@keyframes aispin { to { transform: rotate(360deg); } }
.skin-studio.dark .hero-av { color: #fff; background: rgba(255,255,255,0.16); box-shadow: 0 0 0 3px rgba(255,255,255,0.1); }
.skin-studio.dark .hero-add { color: oklch(0.95 0.02 150); background: rgba(255,255,255,0.16); }

/* ---- My tasks status rows ---- */
.status-list { display: flex; flex-direction: column; gap: 10px; }
.status-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 13px 16px; box-shadow: var(--sh-1);
  transition: box-shadow .14s, transform .08s;
}
.status-ic { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }

function pad(n) { return String(n).padStart(2, '0'); }
function ymd(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function parseYmd(s) { if (!s) return null; const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }

function dayDiff(a, b) { // whole days from a -> b

function fmtDate(s) {
  const d = parseYmd(s); if (!d) return '';
  const diff = dayDiff(TODAY, d);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff > 1 && diff <= 6) return DOW[d.getDay()];
  return `${MON_SHORT[d.getMonth()]} ${d.getDate()}`;

// status: 'done' | 'overdue' | 'soon' | 'upcoming' | 'none'
function dateStatus(s, done) {
  if (done) return 'done';
  if (!s) return 'none';
  const diff = dayDiff(TODAY, parseYmd(s));
  if (diff < 0) return 'overdue';
  if (diff <= 2) return 'soon';

// ---------- completion ----------
function taskProgress(t) {
  if (t.subtasks && t.subtasks.length) {
    const done = t.subtasks.filter(s => s.done).length;
    return Math.round((done / t.subtasks.length) * 100);
  }
  return t.done ? 100 : 0;
}

  if (t.subtasks && t.subtasks.length) return t.subtasks.every(s => s.done);
  return t.done;
}
// effective status for a whole task (worst-case across task + subtasks)
function taskStatus(t) {
  if (taskDone(t)) return 'done';
  const dates = [t.due, ...(t.subtasks || []).filter(s => !s.done).map(s => s.due)].filter(Boolean);
  let best = 'none';
  const rank = { overdue: 3, soon: 2, upcoming: 1, none: 0 };
  for (const d of dates) {

function Checkbox({ checked, onClick, small }) {

function CategoryChip({ cat, vibrant, dark, mono, withDot = true }) {

function PriorityTag({ p, pill }) {

}

function DateChip({ due, done }) {

  const st = dateStatus(due, done);
  const cls = st === 'overdue' ? ' overdue' : st === 'soon' ? ' due-soon' : '';
  return (
    <span className={`chip chip-date${cls}`}>

function ProgressBar({ value }) {

      <span className="progress-num">{value}%</span>

function Segmented({ options, value, onChange }) {

    <div className="seg">
      {options.map(o => (

function Modal({ children, onClose }) {

<script type="text/babel" data-src="TaskList.jsx">
/* ============================================================
   TaskList.jsx — TaskItem (layouts + subtask modes) + grouped list
   ============================================================ */

function TaskItem({ task, vibrant, dark, mono, subtaskMode, onToggleTask, onToggleSub,
                    onEdit, onDelete, onAddSub }) {
  const cat = catById(task.categoryId);
  const progress = taskProgress(task);
  const done = taskDone(task);
  const status = taskStatus(task);
  const hasSubs = task.subtasks && task.subtasks.length > 0;
  const cls = status === 'overdue' ? ' overdue' : status === 'soon' ? ' due-soon' : '';

  const [open, setOpen] = React.useState(false);
  const [adding, setAdding] = React.useState(false);
  const [newSub, setNewSub] = React.useState('');
  const showSubs = hasSubs && (subtaskMode === 'inline' || (subtaskMode === 'collapsible' && open));

  const addSub = () => {
    const v = newSub.trim();
    if (v) { onAddSub(task.id, v); setNewSub(''); }
  };

  return (
    <div className={`task${done ? ' done' : ''}${cls}`}>
      <div className="task-main">
        <Checkbox checked={done} onClick={() => onToggleTask(task.id)} />
        <div className="task-body">
          <div className="task-titlerow">
            <PriorityTag p={task.priority} />
            <span className="task-title">{task.title}</span>
          </div>
          {task.notes && <div className="task-notes">{task.notes}</div>}

          <div className="meta-row">
            <CategoryChip cat={cat} vibrant={vibrant} dark={dark} mono={mono} />
            <DateChip due={task.due} done={done} />
            {task.recurring && task.recurring !== 'none' && (
              <span className="chip chip-recur"><Icon name="repeat" size={12} />
                {task.recurring[0].toUpperCase() + task.recurring.slice(1)}</span>
            )}
            {task.attachments && task.attachments.length > 0 && (
              <span className="chip chip-attach"><Icon name="paperclip" size={12} />{task.attachments.length}</span>
            )}
          </div>

          {hasSubs && <ProgressBar value={progress} />}

          {subtaskMode === 'collapsible' && hasSubs && (
            <button className={`subtask-toggle${open ? ' open' : ''}`} onClick={() => setOpen(o => !o)}>
              <Icon name="chevronR" size={14} />
              {open ? 'Hide' : 'Show'} {task.subtasks.length} subtasks
              <span style={{ color: 'var(--ink-3)', fontWeight: 600 }}>
                · {task.subtasks.filter(s => s.done).length}/{task.subtasks.length} done
              </span>
            </button>
          )}

          {showSubs && (
            <div className="subtasks">
              {task.subtasks.map(s => {
                const sst = dateStatus(s.due, s.done);
                return (
                  <div key={s.id} className={`subtask${s.done ? ' done' : ''}`}>
                    <Checkbox small checked={s.done} onClick={() => onToggleSub(task.id, s.id)} />
                    <span className="subtask-title">{s.title}</span>
                    {s.due && <span className={`subtask-date${sst === 'overdue' ? ' overdue' : sst === 'soon' ? ' due-soon' : ''}`}>{fmtDate(s.due)}</span>}
                  </div>
                );
              })}
              {adding ? (
                <div className="sub-edit" style={{ marginTop: 4 }}>
                  <Checkbox small checked={false} onClick={() => {}} />
                  <input autoFocus value={newSub} placeholder="New subtask…"
                    onChange={e => setNewSub(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') addSub(); if (e.key === 'Escape') { setAdding(false); setNewSub(''); } }}
                    onBlur={() => { addSub(); setAdding(false); }} />
                </div>
              ) : (
                <button className="add-sub" onClick={() => setAdding(true)}><Icon name="plus" size={13} />Add subtask</button>
              )}
            </div>
          )}
        </div>

        <div className="task-actions">
          <button className="mini-btn" onClick={() => onEdit(task.id)} title="Edit"><Icon name="edit" size={16} /></button>
          <button className="mini-btn" onClick={() => onDelete(task.id)} title="Delete"><Icon name="trash" size={16} /></button>
        </div>
      </div>
    </div>
  );
}

// time-bucket grouping
const BUCKETS = [
  { id: 'overdue', label: 'Overdue' },
  { id: 'today',   label: 'Today' },
  { id: 'week',    label: 'This week' },
  { id: 'later',   label: 'Later' },
  { id: 'nodate',  label: 'No date' },
  { id: 'done',    label: 'Completed' },
];
function bucketOf(t) {
  if (taskDone(t)) return 'done';
  if (!t.due) return 'nodate';
  const diff = dayDiff(TODAY, parseYmd(t.due));
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  if (diff <= 7) return 'week';
  return 'later';
}
const PRANK = { high: 0, med: 1, low: 2, null: 3, undefined: 3 };
function sortTasks(arr, sort) {
  const a = [...arr];
  if (sort === 'priority') {
    a.sort((x, y) => (PRANK[x.priority] - PRANK[y.priority]) || cmpDue(x, y));
  } else {
    a.sort(cmpDue);
  }
  return a;
}
function cmpDue(x, y) {
  if (!x.due && !y.due) return 0;
  if (!x.due) return 1;
  if (!y.due) return -1;
  return x.due < y.due ? -1 : x.due > y.due ? 1 : 0;
}

function TaskList({ tasks, layout, sort, vibrant, dark, mono, subtaskMode, handlers }) {
  if (tasks.length === 0) {
    return <EmptyState icon="check" title="Nothing here yet"
      sub="You're all caught up. Add a task or adjust your filters." />;
  }

  let groups;
  if (layout === 'grouped') {
    groups = CATEGORIES.map(c => ({
      key: c.id, label: c.name, dot: catDotColor(c, vibrant, mono),
      items: sortTasks(tasks.filter(t => t.categoryId === c.id), sort),
    })).filter(g => g.items.length);
  } else {
    groups = BUCKETS.map(b => ({
      key: b.id, label: b.label,
      items: sortTasks(tasks.filter(t => bucketOf(t) === b.id), sort),
    })).filter(g => g.items.length);
  }

  const isRows = layout === 'rows';

  return (
    <div>
      {groups.map(g => (
        <div key={g.key}>
          <div className="task-group-head">
            {g.dot && <span className="cat-dot" style={{ width: 10, height: 10, background: g.dot }} />}
            <span className="task-group-title">{g.label}</span>
            <span className="task-group-count">{g.items.length}</span>
            <span className="task-group-line" />
          </div>
          <div className={`tasklist${isRows ? ' rows' : ''}`}>
            {g.items.map(t => (
              <TaskItem key={t.id} task={t} vibrant={vibrant} dark={dark} mono={mono} subtaskMode={subtaskMode} {...handlers} />
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

Object.assign(window, { TaskItem, TaskList, bucketOf, BUCKETS });

</script>

<script type="text/babel" data-src="studio.jsx">
/* ============================================================
   studio.jsx — "Studio" skin dashboard pieces:
   circular progress Ring, hero card, My-tasks status,
   Active-projects ring cards.

function Ring({ value, size = 56, stroke = 6, color = 'var(--accent)', track = 'var(--surface-2)', children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const v = Math.max(0, Math.min(100, value));
  const off = c * (1 - v / 100);
  return (
    <div className="ring" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="ring-svg">
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
          transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: 'stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)' }} />
      </svg>
      {children != null && <div className="ring-label">{children}</div>}
    </div>
  );
}

const STUDIO_WD = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function StudioDashboard({ tasks, dark, onToggleDark, onPickCat, onAdd }) {
  const total = tasks.length;
  const done = tasks.filter(taskDone).length;
  const inprog = tasks.filter((t) => !taskDone(t) && taskProgress(t) > 0).length;
  const todo = tasks.filter((t) => !taskDone(t) && taskProgress(t) === 0).length;
  const overall = total ? Math.round((done / total) * 100) : 0;

  const status = [
    { key: 'todo', label: 'To Do', icon: 'clock', tone: 'todo', n: todo, sub: `${todo} ${todo === 1 ? 'task' : 'tasks'} to start` },
    { key: 'prog', label: 'In Progress', icon: 'spark', tone: 'prog', n: inprog, sub: `${inprog} underway` },
    { key: 'done', label: 'Done', icon: 'ffwd', tone: 'done', n: done, sub: `${done} completed` },
  ];

  const projects = CATEGORIES.map((c) => {
    const items = tasks.filter((t) => t.categoryId === c.id);
    const d = items.filter(taskDone).length;
    return { ...c, total: items.length, done: d, pct: items.length ? Math.round((d / items.length) * 100) : 0 };
  }).filter((p) => p.total > 0);

  const sub = `${STUDIO_WD[TODAY.getDay()]}, ${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}`;

  const [aiOpen, setAiOpen] = React.useState(false);
  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiText, setAiText] = React.useState('');

  const runAiOverview = async () => {
    setAiOpen(true);
    setAiLoading(true);
    setAiText('');
    try {
      const lines = tasks.map((t) => {
        const cat = catById(t.categoryId);
        const st = taskStatus(t);
        const due = t.due ? `due ${t.due}` : 'no due date';
        const pr = t.priority ? `, ${t.priority} priority` : '';
        return `- ${t.title} [${cat ? cat.name : 'uncategorized'}, ${st}, ${due}${pr}]`;
      }).join('\n');
      const prompt = `You are a friendly productivity assistant. Today is ${sub}. Here is my task list (${done} of ${total} complete):\n\n${lines}\n\nWrite a short overview in plain text. Begin with one or two sentences on where things stand — call out anything overdue or due soon. Then add 2-4 brief, specific suggestions for what to focus on next, each on its own line starting with "- ". Keep it under 110 words. No markdown headers or bold.`;
      const text = await window.claude.complete(prompt);
      setAiText((text || '').trim() || 'No overview available.');
    } catch (e) {
      setAiText('Could not generate an overview right now. Please try again.');
    } finally {
      setAiLoading(false);
    }
  };

  return (
    <div className="studio-dash">
      <div className="hero">

          </button>
        </div>
        <div className="hero-row">
          <div className="hero-id">
            <div className="hero-av">JR</div>
            <div>
              <div className="hero-name">Jordan Rivera</div>
              <div className="hero-role">Productive day ahead</div>
            </div>
          </div>
          <Ring value={overall} size={66} stroke={7} color="#fff" track="rgba(255,255,255,0.38)">
            <span className="hero-pct">{overall}<i>%</i></span>
          </Ring>
        </div>
        <div className="hero-foot">
          <span><b>{done}</b> of <b>{total}</b> tasks complete</span>

          </div>
        </div>
        {aiOpen && (
          <div className="hero-ai-panel">
            <div className="hero-ai-head">
              <Icon name="spark" size={14} />AI overview
              <button className="hero-ai-close" onClick={() => setAiOpen(false)} title="Dismiss">
                <Icon name="x" size={13} />

            {aiLoading

            onClick={() => onPickCat(p.id)}>

<script type="text/babel" data-src="TaskEditor.jsx">
/* ============================================================
   TaskEditor.jsx — create / edit modal
   ============================================================ */

function blankTask() {
  return {
    id: null, title: '', notes: '', categoryId: 'work', priority: 'med',
    due: TODAY_STR, recurring: 'none', done: false, subtasks: [], attachments: [],
  };
}

function TaskEditor({ initial, vibrant, dark, onSave, onClose, onDelete }) {
  const [t, setT] = React.useState(() => initial ? JSON.parse(JSON.stringify(initial)) : blankTask());
  const [subInput, setSubInput] = React.useState('');
  const [attachType, setAttachType] = React.useState(null);
  const [attachVal, setAttachVal] = React.useState('');
  const set = (k, v) => setT(p => ({ ...p, [k]: v }));
  const isNew = !t.id;

  const addSub = () => {
    const v = subInput.trim(); if (!v) return;
    set('subtasks', [...t.subtasks, { id: uid(), title: v, due: null, done: false }]);
    setSubInput('');
  };
  const updSub = (id, patch) => set('subtasks', t.subtasks.map(s => s.id === id ? { ...s, ...patch } : s));
  const delSub = (id) => set('subtasks', t.subtasks.filter(s => s.id !== id));

  const addAttach = () => {
    const v = attachVal.trim(); if (!v) { setAttachType(null); return; }
    const meta = attachType === 'link' ? v.replace(/^https?:\/\//, '').split('/')[0] : attachType === 'image' ? 'Image' : 'File';
    set('attachments', [...t.attachments, { id: uid(), type: attachType, name: v, meta }]);
    setAttachVal(''); setAttachType(null);
  };
  const delAttach = (id) => set('attachments', t.attachments.filter(a => a.id !== id));

  const save = () => { if (!t.title.trim()) return; onSave({ ...t, title: t.title.trim() }); };

  return (
    <Modal onClose={onClose}>
      <div className="modal-head">
        <h3>{isNew ? 'New task' : 'Edit task'}</h3>
        <button className="mini-btn" onClick={onClose}><Icon name="x" size={18} /></button>
      </div>

      <div className="modal-body scroll" style={{ overflowY: 'auto' }}>
        <div className="field">
          <input className="input title-input" autoFocus value={t.title} placeholder="What needs doing?"
            onChange={e => set('title', e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && e.metaKey) save(); }} />
        </div>

        <div className="field">
          <label className="field-label">Notes</label>
          <textarea className="textarea" value={t.notes} placeholder="Add details, context, links…"
            onChange={e => set('notes', e.target.value)} />
        </div>

        <div className="field-row">
          <div className="field">
            <label className="field-label">Due date</label>
            <input className="input" type="date" value={t.due || ''} onChange={e => set('due', e.target.value || null)} />
          </div>
          <div className="field">
            <label className="field-label">Repeat</label>
            <select className="select" value={t.recurring} onChange={e => set('recurring', e.target.value)}>
              {RECUR.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </div>
        </div>

        <div className="field">
          <label className="field-label">Category</label>
          <div className="opt-row">
            {CATEGORIES.map(c => (
              <button key={c.id} className={`opt${t.categoryId === c.id ? ' on' : ''}`} onClick={() => set('categoryId', c.id)}>
                <span className="cat-dot" style={{ background: catDotColor(c, vibrant) }} />{c.name}
              </button>
            ))}
          </div>
        </div>

        <div className="field">
          <label className="field-label">Priority</label>
          <div className="opt-row">
            {PRIORITIES.map(p => (
              <button key={p.id} className={`opt${t.priority === p.id ? ' on' : ''}`} onClick={() => set('priority', p.id)}>
                <span className={`flag ${p.id}`} />{p.name}
              </button>
            ))}
            <button className={`opt${!t.priority ? ' on' : ''}`} onClick={() => set('priority', null)}>None</button>
          </div>
        </div>

        <div className="field">
          <label className="field-label">Subtasks {t.subtasks.length > 0 && `· ${t.subtasks.filter(s => s.done).length}/${t.subtasks.length}`}</label>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            {t.subtasks.map(s => (
              <div key={s.id} className="sub-edit">
                <Checkbox small checked={s.done} onClick={() => updSub(s.id, { done: !s.done })} />
                <input value={s.title} onChange={e => updSub(s.id, { title: e.target.value })} />
                <input className={`sub-date-btn${s.due ? ' set' : ''}`} type="date" value={s.due || ''}
                  style={{ width: 130 }} onChange={e => updSub(s.id, { due: e.target.value || null })} />
                <button className="mini-btn" onClick={() => delSub(s.id)}><Icon name="x" size={15} /></button>
              </div>
            ))}
            <div className="sub-edit">
              <Icon name="plus" size={16} style={{ color: 'var(--ink-3)' }} />
              <input value={subInput} placeholder="Add a subtask…"
                onChange={e => setSubInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') addSub(); }} />
            </div>
          </div>
        </div>

        <div className="field">
          <label className="field-label">Attachments</label>
          <div className="attach-list">
            {t.attachments.map(a => (
              <div key={a.id} className="attach">
                <AttachIcon type={a.type} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="attach-name">{a.name}</div>
                  <div className="attach-meta">{a.meta}</div>
                </div>
                <button className="mini-btn" onClick={() => delAttach(a.id)}><Icon name="x" size={15} /></button>
              </div>
            ))}
            {attachType ? (
              <div className="sub-edit">
                <AttachIcon type={attachType} />
                <input autoFocus value={attachVal}
                  placeholder={attachType === 'link' ? 'Paste a URL…' : attachType === 'image' ? 'Image file name…' : 'File name…'}
                  onChange={e => setAttachVal(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') addAttach(); if (e.key === 'Escape') { setAttachType(null); setAttachVal(''); } }}
                  onBlur={addAttach} />
              </div>
            ) : (
              <div className="add-attach-row">
                <button className="opt" onClick={() => setAttachType('file')}><Icon name="file" size={15} />File</button>
                <button className="opt" onClick={() => setAttachType('link')}><Icon name="link" size={15} />Link</button>
                <button className="opt" onClick={() => setAttachType('image')}><Icon name="image" size={15} />Image</button>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="modal-foot">
        {!isNew ? (
          <button className="btn btn-ghost" style={{ color: 'var(--red-ink)' }} onClick={() => onDelete(t.id)}>
            <Icon name="trash" size={16} />Delete
          </button>
        ) : <span />}
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save}><Icon name="check" size={16} />{isNew ? 'Add task' : 'Save'}</button>
        </div>
      </div>
    </Modal>
  );
}

Object.assign(window, { TaskEditor, blankTask });

</script>

<script type="text/babel" data-src="Calendar.jsx">
/* ============================================================
   Calendar.jsx — month grid · agenda · timeline
   ============================================================ */

// flatten tasks into dated events (task-level + dated subtasks)
function eventsFor(tasks) {
  const ev = [];
  tasks.forEach(t => {
    const cat = catById(t.categoryId);
    if (t.due) ev.push({ date: t.due, title: t.title, taskId: t.id, cat, done: taskDone(t), status: taskStatus(t), kind: 'task' });
    (t.subtasks || []).forEach(s => {
      if (s.due) ev.push({ date: s.due, title: s.title, taskId: t.id, cat, done: s.done, status: dateStatus(s.due, s.done), kind: 'sub', parent: t.title });
    });
  });
  return ev;
}
function byDay(events) {
  const m = {};
  events.forEach(e => { (m[e.date] = m[e.date] || []).push(e); });
  return m;
}

function MonthGrid({ tasks, monthDate, onEdit, vibrant, mono, mobile, selected, setSelected }) {
  const events = byDay(eventsFor(tasks));
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const first = new Date(y, m, 1);
  const startOffset = first.getDay();
  const gridStart = addDays(first, -startOffset);

  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = addDays(gridStart, i);
    const key = ymd(d);
    const inMonth = d.getMonth() === m;
    const isToday = key === TODAY_STR;
    const dayEv = events[key] || [];
    if (i >= 35 && cells.slice(35).length === 0) { /* allow 6th row only if needed */ }
    cells.push({ d, key, inMonth, isToday, dayEv });
  }
  // trim to 5 rows if 6th row entirely out of month & empty
  const lastRow = cells.slice(35);
  const showSix = lastRow.some(c => c.inMonth || c.dayEv.length);
  const visible = showSix ? cells : cells.slice(0, 35);

  return (
    <div className="cal-grid" style={{ gridTemplateRows: mobile ? undefined : `auto repeat(${visible.length / 7}, 1fr)` }}>
      {DOW.map(d => <div key={d} className="cal-dow">{mobile ? d[0] : d}</div>)}
      {visible.map(c => {
        const isSel = mobile && selected === c.key;
        return (
          <div key={c.key}
            className={`cal-cell${c.inMonth ? '' : ' out'}${c.isToday ? ' today' : ''}`}
            style={isSel ? { background: 'var(--accent-soft)' } : undefined}
            onClick={() => mobile && setSelected(c.key)}>
            <div className="cal-daynum">{c.d.getDate()}</div>
            {mobile ? (
              <div className="cal-dots">
                {c.dayEv.slice(0, 4).map((e, i) => (
                  <span key={i} className="ev-dot" style={{ background: e.status === 'overdue' ? 'var(--red)' : catDotColor(e.cat, vibrant, mono), opacity: e.done ? 0.4 : 1 }} />
                ))}
              </div>
            ) : (
              <React.Fragment>
                {c.dayEv.slice(0, 3).map((e, i) => (
                  <button key={i} className={`cal-event${e.done ? ' done' : ''}${e.status === 'overdue' ? ' overdue' : ''}`}
                    style={e.status === 'overdue' ? undefined : { background: catStyle(e.cat, { vibrant, mono })['--cc-bg'], color: catStyle(e.cat, { vibrant, mono })['--cc-tx'] }}
                    onClick={() => onEdit(e.taskId)}>
                    <span className="ev-dot" style={{ background: e.status === 'overdue' ? 'var(--red)' : catDotColor(e.cat, vibrant, mono) }} />
                    {e.title}
                  </button>
                ))}
                {c.dayEv.length > 3 && <span className="cal-more">+{c.dayEv.length - 3} more</span>}
              </React.Fragment>
            )}
          </div>
        );
      })}
    </div>
  );
}

function MobileDayList({ tasks, day, onEdit, vibrant, dark, mono }) {
  const events = byDay(eventsFor(tasks))[day] || [];
  const d = parseYmd(day);
  return (
    <div style={{ marginTop: 14 }}>
      <div className="task-group-head" style={{ marginTop: 4 }}>
        <span className="task-group-title">{DOW[d.getDay()]}, {MON_SHORT[d.getMonth()]} {d.getDate()}</span>
        <span className="task-group-count">{events.length}</span>
        <span className="task-group-line" />
      </div>
      {events.length === 0
        ? <EmptyState icon="calendar" title="No tasks this day" />
        : <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {events.map((e, i) => (
              <button key={i} className="task" style={{ textAlign: 'left', width: '100%' }} onClick={() => onEdit(e.taskId)}>
                <div className="task-main">
                  <span className="cat-dot" style={{ width: 12, height: 12, marginTop: 4, background: e.status === 'overdue' ? 'var(--red)' : catDotColor(e.cat, vibrant, mono) }} />
                  <div className="task-body">
                    <div className="task-title" style={{ fontSize: 14, textDecoration: e.done ? 'line-through' : 'none', opacity: e.done ? 0.6 : 1 }}>{e.title}</div>
                    {e.kind === 'sub' && <div className="task-notes">in {e.parent}</div>}
                  </div>
                </div>
              </button>
            ))}
          </div>}
    </div>
  );
}

function AgendaView({ tasks, monthDate, onEdit, vibrant, dark, mono }) {
  const events = eventsFor(tasks).filter(e => !e.done);
  const map = byDay(events);
  const days = Object.keys(map).sort();
  if (days.length === 0) return <EmptyState icon="agenda" title="Nothing scheduled" sub="Tasks with due dates appear here, grouped by day." />;
  return (
    <div className="agenda">
      {days.map(key => {
        const d = parseYmd(key);
        const isToday = key === TODAY_STR;
        return (
          <div key={key} className={`agenda-day${isToday ? ' today' : ''}`}>
            <div className="agenda-date">
              <div className="agenda-dow">{isToday ? 'Today' : DOW[d.getDay()]}</div>
              <div className="agenda-num">{d.getDate()}</div>
              <div className="agenda-dow" style={{ fontWeight: 600 }}>{MON_SHORT[d.getMonth()]}</div>
            </div>
            <div className="agenda-items">
              {map[key].map((e, i) => (
                <button key={i} className={`task${e.status === 'overdue' ? ' overdue' : e.status === 'soon' ? ' due-soon' : ''}`} style={{ textAlign: 'left' }} onClick={() => onEdit(e.taskId)}>
                  <div className="task-main">
                    <span className="cat-dot" style={{ width: 11, height: 11, marginTop: 4, background: catDotColor(e.cat, vibrant, mono) }} />
                    <div className="task-body">
                      <div className="task-title" style={{ fontSize: 14.5 }}>{e.title}</div>
                      <div className="meta-row" style={{ marginTop: 7 }}>
                        <CategoryChip cat={e.cat} vibrant={vibrant} dark={dark} mono={mono} />
                        {e.kind === 'sub' && <span className="chip chip-attach">subtask</span>}
                      </div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TimelineView({ tasks, onEdit, vibrant, dark, mono, mobile }) {
  const WIN = mobile ? 10 : 14;
  const start = TODAY;
  const list = tasks.filter(t => !taskDone(t) && t.due).map(t => {
    const cat = catById(t.categoryId);
    const subDues = (t.subtasks || []).map(s => s.due).filter(Boolean).map(parseYmd);
    const dueD = parseYmd(t.due);
    let startD = subDues.length ? new Date(Math.min(...subDues.map(d => +d), +dueD)) : dueD;
    if (startD < start) startD = start;
    return { t, cat, startOff: dayDiff(start, startD), endOff: dayDiff(start, dueD), status: taskStatus(t) };
  }).filter(x => x.endOff >= 0 && x.startOff < WIN)
    .sort((a, b) => a.endOff - b.endOff);

  if (list.length === 0) return <EmptyState icon="timeline" title="No upcoming deadlines" sub={`Tasks due in the next ${WIN} days show as bars here.`} />;

  const ticks = [];
  for (let i = 0; i < WIN; i += (mobile ? 2 : 2)) ticks.push(addDays(start, i));

  return (
    <div className="timeline">
      <div className="tl-scale">
        <div className="tl-label">Task</div>
        <div className="tl-scale-inner">
          {ticks.map((d, i) => <span key={i}>{MON_SHORT[d.getMonth()]} {d.getDate()}</span>)}
        </div>
      </div>
      {list.map(({ t, cat, startOff, endOff, status }) => {
        const s = Math.max(0, startOff);
        const e = Math.min(WIN - 1, endOff);
        const left = (s / WIN) * 100;
        const width = Math.max(((e - s + 1) / WIN) * 100, 9);
        const color = status === 'overdue' ? 'var(--red)' : status === 'soon' ? 'var(--amber)' : catDotColor(cat, vibrant, mono);
        return (
          <div key={t.id} className="tl-row">
            <div className="tl-label" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</div>
            <div className="tl-track">
              <button className="tl-bar" style={{ left: `${left}%`, width: `${width}%`, background: color }} onClick={() => onEdit(t.id)}>
                {t.title}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

Object.assign(window, { MonthGrid, AgendaView, TimelineView, MobileDayList, eventsFor, byDay });

</script>
