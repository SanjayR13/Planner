// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-src="App.jsx">
/* ============================================================
   App.jsx — PlannerSurface (responsive) + AppRoot (shared state,
   tweaks, side-by-side web + mobile showcase)
   ============================================================ */

const WD_FULL = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
function todaySub() {return `${WD_FULL[TODAY.getDay()]}, ${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}`;}

const TAB_DEF = [
{ id: 'today', label: 'Today', icon: 'today' },
{ id: 'upcoming', label: 'Upcoming', icon: 'clock' },
{ id: 'all', label: 'All Tasks', icon: 'list' },
{ id: 'calendar', label: 'Calendar', icon: 'calendar' }];

const CAL_VIEWS = [
{ id: 'month', label: 'Month', icon: 'grid' },
{ id: 'agenda', label: 'Agenda', icon: 'agenda' },
{ id: 'timeline', label: 'Timeline', icon: 'timeline' }];


function matchSearch(t, q) {
  if (!q) return true;
  q = q.toLowerCase();
  return t.title.toLowerCase().includes(q) || (t.notes || '').toLowerCase().includes(q) ||
  (t.subtasks || []).some((s) => s.title.toLowerCase().includes(q));
}

function PlannerSurface({ formFactor, tasks, t, root }) {
  const mobile = formFactor === 'mobile';
  const [tab, setTab] = React.useState('today');
  const [catFilter, setCatFilter] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [sort, setSort] = React.useState('due');
  const [hideDone, setHideDone] = React.useState(false);
  const [calView, setCalView] = React.useState(t.calendarDefault);
  const [monthDate, setMonthDate] = React.useState(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1));
  const [selDay, setSelDay] = React.useState(TODAY_STR);
  const [editId, setEditId] = React.useState(undefined); // undefined=closed, null=new, id=edit

  React.useEffect(() => {setCalView(t.calendarDefault);}, [t.calendarDefault]);

  const vibrant = t.theme === 'vibrant';
  const mono = t.theme === 'mono';
  const studio = t.skin === 'studio';
  const colorOpts = { vibrant, mono };

  // base filtered (category + search)
  const base = tasks.filter((x) => (!catFilter || x.categoryId === catFilter) && matchSearch(x, search));

  // tab filtered
  let listTasks = base;
  if (tab === 'today') listTasks = base.filter((x) => ['overdue', 'today'].includes(bucketOf(x)));else
  if (tab === 'upcoming') listTasks = base.filter((x) => ['week', 'later', 'nodate'].includes(bucketOf(x)) && !taskDone(x));else
  if (tab === 'all' && hideDone) listTasks = base.filter((x) => !taskDone(x));

  // counts
  const cnt = {
    today: tasks.filter((x) => ['overdue', 'today'].includes(bucketOf(x))).length,
    upcoming: tasks.filter((x) => ['week', 'later', 'nodate'].includes(bucketOf(x)) && !taskDone(x)).length,
    all: tasks.length
  };
  const stats = {
    today: tasks.filter((x) => bucketOf(x) === 'today').length,
    overdue: tasks.filter((x) => bucketOf(x) === 'overdue').length,
    week: tasks.filter((x) => bucketOf(x) === 'week').length,
    done: tasks.filter((x) => taskDone(x)).length
  };

  const handlers = {
    onToggleTask: root.toggleTask, onToggleSub: root.toggleSub, onAddSub: root.addSub,
    onEdit: (id) => setEditId(id), onDelete: root.deleteTask
  };

  const titles = {
    today: ['Today', todaySub()],
    upcoming: ['Upcoming', 'Tasks with a future due date'],
    all: ['All Tasks', `${tasks.length} tasks · ${stats.done} completed`],
    calendar: ['Calendar', `${MONTHS[monthDate.getMonth()]} ${monthDate.getFullYear()}`]
  };

  // ---- calendar block (shared) ----
  function CalendarBlock() {
    return (
      <div>
        {!mobile &&
        <div className="cal-head">
            {calView === 'month' &&
          <React.Fragment>
                <div className="cal-month">{MONTHS[monthDate.getMonth()]} {monthDate.getFullYear()}</div>
                <div className="cal-nav">
                  <button className="icon-btn" onClick={() => setMonthDate(new Date(monthDate.getFullYear(), monthDate.getMonth() - 1, 1))}><Icon name="chevronL" size={18} /></button>
                  <button className="icon-btn" onClick={() => setMonthDate(new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 1))}><Icon name="chevronR" size={18} /></button>
                  <button className="btn btn-ghost" onClick={() => setMonthDate(new Date(TODAY.getFullYear(), TODAY.getMonth(), 1))}>Today</button>
                </div>
              </React.Fragment>
          }
            <div className="topbar-spacer" />
            <Segmented options={CAL_VIEWS} value={calView} onChange={setCalView} />
          </div>
        }
        {mobile &&
        <div style={{ display: 'flex', gap: 8, padding: '0 0 12px', alignItems: 'center' }}>
            <Segmented options={CAL_VIEWS} value={calView} onChange={setCalView} />
            {calView === 'month' &&
          <div className="cal-nav" style={{ marginLeft: 'auto' }}>
                <button className="icon-btn" style={{ width: 34, height: 34 }} onClick={() => setMonthDate(new Date(monthDate.getFullYear(), monthDate.getMonth() - 1, 1))}><Icon name="chevronL" size={16} /></button>
                <button className="icon-btn" style={{ width: 34, height: 34 }} onClick={() => setMonthDate(new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 1))}><Icon name="chevronR" size={16} /></button>
              </div>
          }
          </div>
        }
        {calView === 'month' && <MonthGrid tasks={base} monthDate={monthDate} onEdit={handlers.onEdit} {...colorOpts} mobile={mobile} selected={selDay} setSelected={setSelDay} />}
        {calView === 'month' && mobile && <MobileDayList tasks={base} day={selDay} onEdit={handlers.onEdit} vibrant={vibrant} dark={t.dark} mono={mono} />}
        {calView === 'agenda' && <AgendaView tasks={base} monthDate={monthDate} onEdit={handlers.onEdit} vibrant={vibrant} dark={t.dark} mono={mono} />}
        {calView === 'timeline' && <TimelineView tasks={base} onEdit={handlers.onEdit} vibrant={vibrant} dark={t.dark} mono={mono} mobile={mobile} />}
      </div>);

  }

  function ListBlock() {
    return <TaskList tasks={listTasks} layout={t.listLayout} sort={sort} vibrant={vibrant} dark={t.dark} mono={mono} subtaskMode={t.subtaskMode} handlers={handlers} />;
  }

  function TodayBlock() {
    if (!studio) return <ListBlock />;
    return (
      <React.Fragment>
        <StudioDashboard
          tasks={tasks} dark={t.dark}
          onToggleDark={() => root.setTweak('dark', !t.dark)}
          onPickCat={(id) => {setCatFilter(id);setTab('all');}}
          onAdd={() => setEditId(null)} />
        <div className="dash-sec-head sched">Today’s schedule</div>
        <ListBlock />
      </React.Fragment>);

  }

  const editor = editId !== undefined &&
  <TaskEditor
    initial={editId === null ? null : tasks.find((x) => x.id === editId)}
    vibrant={vibrant} dark={t.dark}
    onSave={(task) => {root.saveTask(task);setEditId(undefined);}}
    onClose={() => setEditId(undefined)}
    onDelete={(id) => {root.deleteTask(id);setEditId(undefined);}} />;



  // ============ DESKTOP ============
  if (!mobile) {
    return (
      <div className={`surface desktop skin-${t.skin}${t.dark ? ' dark' : ''}`} style={{ '--accent': t.accent }}>
        <aside className="sidebar">
          <div className="brand">
            <div className="brand-mark"><Icon name="check" size={19} strokeWidth={2.6} /></div>
            <div>
              <div className="brand-name">Work Planner</div>
              <div className="brand-sub">Plan · Track · Done</div>
            </div>
          </div>
          {TAB_DEF.map((d) =>
          <button key={d.id} className={`nav-item${tab === d.id ? ' active' : ''}`} onClick={() => setTab(d.id)}>
              <Icon name={d.icon} size={19} />{d.label}
              {cnt[d.id] != null && <span className="count">{cnt[d.id]}</span>}
            </button>
          )}
          <div className="nav-label">Categories</div>
          {CATEGORIES.map((c) => {
            const n = tasks.filter((x) => x.categoryId === c.id && !taskDone(x)).length;
            return (
              <button key={c.id} className={`cat-row${catFilter === c.id ? ' active' : ''}`} onClick={() => setCatFilter(catFilter === c.id ? null : c.id)}>
                <span className="cat-dot" style={{ background: catDotColor(c, vibrant, mono) }} />{c.name}
                <span className="count">{n}</span>
              </button>);

          })}
          <div className="sidebar-foot">
            <div className="avatar">JR</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13.5, fontWeight: 650 }}>Jordan Rivera</div>
              <div style={{ fontSize: 11.5, color: 'var(--ink-3)' }}>Personal plan</div>
            </div>
            <button className="mini-btn" onClick={() => root.setTweak('dark', !t.dark)} title="Toggle theme">
              <Icon name={t.dark ? 'sun' : 'moon'} size={17} />
            </button>
          </div>
        </aside>

        <main className="main">
          <div className="topbar">
            <div>
              <div className="page-title">{titles[tab][0]}{catFilter && <span style={{ color: 'var(--ink-3)', fontWeight: 600 }}> · {catById(catFilter).name}</span>}</div>
              <div className="page-sub">{titles[tab][1]}</div>
            </div>
            <div className="topbar-spacer" />
            <div className="search">
              <Icon name="search" size={16} />
              <input placeholder="Search tasks…" value={search} onChange={(e) => setSearch(e.target.value)} />
            </div>
            <button className="btn btn-primary" onClick={() => setEditId(null)}><Icon name="plus" size={16} />New task</button>
          </div>

          {tab === 'today' && !studio &&
          <div className="stats">
              <div className="stat"><div className="stat-num">{stats.today}</div><div className="stat-label">Due today</div></div>
              <div className="stat red"><div className="stat-num">{stats.overdue}</div><div className="stat-label">Overdue</div></div>
              <div className="stat amber"><div className="stat-num">{stats.week}</div><div className="stat-label">Due this week</div></div>
              <div className="stat green"><div className="stat-num">{stats.done}</div><div className="stat-label">Completed</div></div>
            </div>
          }

          {tab !== 'calendar' &&
          <div className="toolbar">
              <Segmented options={[{ id: 'due', label: 'Due date', icon: 'calendar' }, { id: 'priority', label: 'Priority', icon: 'flag' }]} value={sort} onChange={setSort} />
              {tab === 'all' && <button className={`chip-toggle${hideDone ? ' on' : ''}`} onClick={() => setHideDone((h) => !h)}>Hide completed</button>}
            </div>
          }

          <div className="content scroll">
            <div className="content-pad">
              {tab === 'calendar' ? <CalendarBlock /> : tab === 'today' ? <TodayBlock /> : <ListBlock />}
            </div>
          </div>
        </main>
        {editor}
      </div>);

  }

  // ============ MOBILE ============
  const mTabs = [TAB_DEF[0], TAB_DEF[1], 'fab', TAB_DEF[3], TAB_DEF[2]];
  return (
    <div className={`surface mobile skin-${t.skin}${t.dark ? ' dark' : ''}`} style={{ '--accent': t.accent }}>
      {!(studio && tab === 'today') &&
      <div className="m-header">
        <div>
          <div className="m-title">{titles[tab][0]}</div>
          <div className="m-sub">{titles[tab][1]}</div>
        </div>
        <div className="m-header-spacer" />
        <button className="icon-btn" onClick={() => root.setTweak('dark', !t.dark)}><Icon name={t.dark ? 'sun' : 'moon'} size={17} /></button>
      </div>
      }

      {tab !== 'calendar' && !(studio && tab === 'today') &&
      <div className="m-search">
          <Icon name="search" size={16} />
          <input placeholder="Search tasks…" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
      }

      {tab !== 'calendar' && !(studio && tab === 'today') &&
      <div className="m-filters">
          <button className={`m-chip${!catFilter ? ' on' : ''}`} onClick={() => setCatFilter(null)}>All</button>
          {CATEGORIES.map((c) =>
        <button key={c.id} className={`m-chip${catFilter === c.id ? ' on' : ''}`} onClick={() => setCatFilter(catFilter === c.id ? null : c.id)}>
              <span className="cat-dot" style={{ background: catDotColor(c, vibrant, mono) }} />{c.name}
            </button>
        )}
        </div>
      }

      {tab === 'today' && !studio &&
      <div className="m-stats">
          <div className="m-stat"><div className="m-stat-num">{stats.today}</div><div className="m-stat-label">Today</div></div>
          <div className="m-stat red"><div className="m-stat-num">{stats.overdue}</div><div className="m-stat-label">Overdue</div></div>
          <div className="m-stat amber"><div className="m-stat-num">{stats.week}</div><div className="m-stat-label">This week</div></div>
        </div>
      }

      <div className="m-content scroll">
        {tab === 'calendar' ? <CalendarBlock /> : tab === 'today' ? <TodayBlock /> : <ListBlock />}
      </div>

      <nav className="tabbar">
        {mTabs.map((d, i) => d === 'fab' ?
        <div key="fab" className="fab-wrap"><button className="fab" onClick={() => setEditId(null)}><Icon name="plus" size={26} strokeWidth={2.4} /></button></div> :

        <button key={d.id} className={`tab${tab === d.id ? ' active' : ''}`} onClick={() => setTab(d.id)}>
            <Icon name={d.icon} size={23} />{d.label}
          </button>
        )}
      </nav>
      {editor}
    </div>);

}

// ============================================================
// AppRoot — shared task state + tweaks + showcase
// ============================================================
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "soft",
  "skin": "studio",
  "listLayout": "cards",
  "subtaskMode": "inline",
  "calendarDefault": "month",
  "accent": "#708871",
  "dark": false
} /*EDITMODE-END*/;

function AppRoot() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tasks, setTasks] = React.useState(SEED);

  const root = React.useMemo(() => ({
    setTweak,
    toggleTask: (id) => setTasks((ts) => ts.map((x) => {
      if (x.id !== id) return x;
      if (x.subtasks && x.subtasks.length) {
        const all = x.subtasks.every((s) => s.done);
        return { ...x, subtasks: x.subtasks.map((s) => ({ ...s, done: !all })), done: !all };
      }
      return { ...x, done: !x.done };
    })),
    toggleSub: (id, sid) => setTasks((ts) => ts.map((x) => {
      if (x.id !== id) return x;
      const subtasks = x.subtasks.map((s) => s.id === sid ? { ...s, done: !s.done } : s);
      return { ...x, subtasks, done: subtasks.every((s) => s.done) };
    })),
    addSub: (id, title) => setTasks((ts) => ts.map((x) => x.id === id ?
    { ...x, subtasks: [...x.subtasks, { id: uid(), title, due: null, done: false }], done: false } : x)),
    deleteTask: (id) => setTasks((ts) => ts.filter((x) => x.id !== id)),
    saveTask: (task) => setTasks((ts) => {
      if (task.id && ts.some((x) => x.id === task.id)) return ts.map((x) => x.id === task.id ? task : x);
      return [{ ...task, id: task.id || uid() }, ...ts];
    })
  }), []);

  // ---- responsive: render ONE layout based on the device/viewport ----
  // Phones (narrow viewports) get the mobile app; everything wider gets desktop.
  const [isMobile, setIsMobile] = React.useState(
    typeof window !== 'undefined' ? window.innerWidth < 768 : false
  );
  React.useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  return (
    <React.Fragment>
      <PlannerSurface formFactor={isMobile ? 'mobile' : 'desktop'} tasks={tasks} t={t} root={root} />

      <TweaksPanel>
        <TweakSection label="Visual theme" />
        <TweakRadio label="Design" value={t.skin} options={[{ value: 'studio', label: 'Studio' }, { value: 'sage', label: 'Sage' }, { value: 'paper', label: 'Paper' }, { value: 'editorial', label: 'Editorial' }, { value: 'candy', label: 'Candy' }]} onChange={(v) => setTweak('skin', v)} />
        <TweakRadio label="Style" value={t.theme} options={[{ value: 'soft', label: 'Soft' }, { value: 'vibrant', label: 'Vibrant' }, { value: 'mono', label: 'Minimal' }]} onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="Accent" value={t.accent} options={['#708871', '#6C72E0', '#A98EC7', '#DE6FA1', '#2FA8A0', '#E0A35C']} onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak('dark', v)} />

        <TweakSection label="Task list" />
        <TweakRadio label="Layout" value={t.listLayout} options={[{ value: 'cards', label: 'Cards' }, { value: 'rows', label: 'Rows' }, { value: 'grouped', label: 'By category' }]} onChange={(v) => setTweak('listLayout', v)} />
        <TweakRadio label="Subtasks" value={t.subtaskMode} options={[{ value: 'inline', label: 'Inline' }, { value: 'collapsible', label: 'Collapse' }, { value: 'progress', label: 'Bar only' }]} onChange={(v) => setTweak('subtaskMode', v)} />

        <TweakSection label="Calendar" />
        <TweakRadio label="Default view" value={t.calendarDefault} options={[{ value: 'month', label: 'Month' }, { value: 'agenda', label: 'Agenda' }, { value: 'timeline', label: 'Timeline' }]} onChange={(v) => setTweak('calendarDefault', v)} />
      </TweaksPanel>
    </React.Fragment>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);
</script>

</body>
</html>
