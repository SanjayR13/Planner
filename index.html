      <div className="status-section">
        <div className="status-row">
          <div className="status-icon" style={{background:'var(--red-soft)',color:'var(--red-ink)'}}><Icon name="clock" size={16} strokeWidth={2}/></div>
          <div className="status-info"><span className="status-name">To Do</span><span className="status-cnt">{todoCount} task{todoCount!==1?'s':''}</span></div>
        </div>
        <div className="status-row">
          <div className="status-icon" style={{background:'var(--amber-soft)',color:'var(--amber-ink)'}}><Icon name="zap" size={16} strokeWidth={2}/></div>
          <div className="status-info"><span className="status-name">In Progress</span><span className="status-cnt">{inProgressCount} task{inProgressCount!==1?'s':''}</span></div>
        </div>
        <div className="status-row">
          <div className="status-icon" style={{background:'var(--green-soft)',color:'var(--green)'}}><Icon name="check" size={16} strokeWidth={2.5}/></div>
          <div className="status-info"><span className="status-name">Done</span><span className="status-cnt">{doneCount} task{doneCount!==1?'s':''}</span></div>
        </div>
      </div>
      {/* Categories */}
      <div className="nav-label"><span className="nav-label-text">Categories</span><button className="mini-btn" title="Manage categories" onClick={()=>setShowCatMgr(true)}><Icon name="settings" size={14}/></button></div>
      <SidebarCats/>
    </aside>
    <main className="main">
      <div className="topbar"><div><div className="page-title">{titles[tab]?.[0]||tab}{catFilter&&<span style={{color:'var(--ink-3)',fontWeight:600}}> · {catById(catFilter).name}</span>}</div><div className="page-sub">{titles[tab]?.[1]||''}</div></div><div className="topbar-spacer"/>
        {isListTab&&<button className={`icon-btn${bulkMode?' on':''}`} title="Select mode" onClick={()=>{setBulkMode(b=>!b);setSelectedIds(new Set());}} style={{marginRight:4,background:bulkMode?'var(--accent-soft)':undefined,borderColor:bulkMode?'var(--accent)':undefined}}><Icon name="checkSq" size={17}/></button>}
        <div className="search"><Icon name="search" size={16}/><input placeholder="Search tasks…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn btn-primary" onClick={()=>setEditId(null)}><Icon name="plus" size={16}/>New task</button>
      </div>
      {BulkBar}
      {tab==='today'&&<div className={`stats${streak.count>0?' stats-5':''}`}><div className="stat"><div className="stat-num">{stats.today}</div><div className="stat-label">Due today</div></div><div className="stat red"><div className="stat-num">{stats.overdue}</div><div className="stat-label">Overdue</div></div><div className="stat amber"><div className="stat-num">{stats.week}</div><div className="stat-label">This week</div></div><div className="stat green"><div className="stat-num">{stats.done}</div><div className="stat-label">Completed</div></div>{streak.count>0&&<div className="stat streak-stat"><div className="stat-num">{streak.count}</div><div className="stat-label">Day streak <Icon name="zap" size={11} style={{verticalAlign:'middle'}}/></div></div>}</div>}
      {isListTab&&<div className="toolbar"><Segmented options={[{id:'due',label:'Due date',icon:'calendar'},{id:'priority',label:'Priority',icon:'flag'}]} value={sort} onChange={setSort}/>{tab==='all'&&<button className={`chip-toggle${hideDone?' on':''}`} onClick={()=>setHideDone(h=>!h)}>Hide completed</button>}</div>}
      <div className="content scroll"><div className="content-pad"><MainContent/></div></div>
    </main>
    {editor}{catMgr}{authModal}{settingsModal}
    <UndoToast task={undoTask} onUndo={root.undoDelete} onDismiss={root.dismissUndo}/>
  </div>;

  // mobile
  const selectedParentCat=catFilter?CATEGORIES.find(c=>c.id===catFilter&&!c.parentId):null;
  const mobileSubs=selectedParentCat?catChildren(selectedParentCat.id):[];
  const mTabs=[orderedTabs[0],orderedTabs[1],'fab',orderedTabs[2],orderedTabs[3]].filter(Boolean);
  return<div className={`surface mobile${dark?' dark':''}`} style={{'--accent':accent}}>
    <div className="m-header"><div><div className="m-title">{titles[tab]?.[0]||tab}</div><div className="m-sub">{titles[tab]?.[1]||''}</div></div><div className="m-header-spacer"/>{IS_SUPABASE&&session&&<button className="icon-btn" style={{border:'none',background:'none'}} title="Refresh" onClick={root.refresh}><span style={{display:'flex',animation:syncStatus==='busy'?'spin .7s linear infinite':'none'}}><Icon name="refresh" size={18}/></span></button>}<button className="icon-btn" style={{border:'none',background:'none'}} onClick={()=>setShowCatMgr(true)} title="Categories"><Icon name="list" size={18}/></button><button className="icon-btn" style={{border:'none',background:'none'}} onClick={()=>setShowSettings(true)} title="Settings"><Icon name="settings" size={18}/></button><button className="icon-btn" style={{border:'none',background:'none'}} onClick={()=>root.setDark(!dark)}><Icon name={dark?'sun':'moon'} size={17}/></button><button className={`avatar${session?' logged-in':''}`} style={{width:30,height:30,fontSize:11}} title={session?'Account':'Sign in'} onClick={()=>setShowAuth(true)}>{initials}</button></div>
    {isListTab&&<div className="m-search"><Icon name="search" size={16}/><input placeholder="Search tasks…" value={search} onChange={e=>setSearch(e.target.value)}/></div>}
    {BulkBar}
    {isListTab&&<div className="m-filters"><button className={`m-chip${!catFilter?' on':''}`} onClick={()=>setCatFilter(null)}>All</button>{topLevelCats.map(c=>{const nAll=tasks.filter(x=>catAllIds(c.id).includes(x.categoryId)&&!taskDone(x)).length;return<button key={c.id} className={`m-chip${catFilter===c.id||catChildren(c.id).some(sc=>sc.id===catFilter)?' on':''}`} onClick={()=>setCatFilter(catFilter===c.id?null:c.id)}><span className="cat-dot" style={{background:catDotColor(c,vibrant,mono)}}/>{c.name}{nAll>0&&<span style={{fontSize:10,opacity:.7}}>{nAll}</span>}</button>;})}</div>}
    {isListTab&&mobileSubs.length>0&&<div className="m-subcats"><span style={{fontSize:11,color:'var(--ink-3)',flexShrink:0,paddingTop:5}}>↳</span>{mobileSubs.map(sc=>{const n=tasks.filter(x=>x.categoryId===sc.id&&!taskDone(x)).length;return<button key={sc.id} className={`m-subchip${catFilter===sc.id?' on':''}`} onClick={()=>setCatFilter(catFilter===sc.id?selectedParentCat.id:sc.id)}><span className="cat-dot" style={{background:catDotColor(sc,vibrant,mono),width:7,height:7}}/>{sc.name}</button>;})}</div>}
    {tab==='today'&&<div className="m-stats"><div className="m-stat"><div className="m-stat-num">{stats.today}</div><div className="m-stat-label">Today</div></div><div className="m-stat red"><div className="m-stat-num">{stats.overdue}</div><div className="m-stat-label">Overdue</div></div><div className="m-stat amber"><div className="m-stat-num">{stats.week}</div><div className="m-stat-label">This week</div></div>{streak.count>0&&<div className="m-stat"><div className="m-stat-num" style={{color:'var(--accent-ink)'}}>{streak.count}</div><div className="m-stat-label">Streak</div></div>}</div>}
    <div className="m-content scroll"><MainContent/></div>
    <nav className="tabbar">{mTabs.map((d,i)=>d==='fab'?<div key="fab" className="fab-wrap"><button className="fab" onClick={()=>setEditId(null)}><Icon name="plus" size={26} strokeWidth={2.4}/></button></div>:<button key={d.id} className={`tab${tab===d.id?' active':''}`} onClick={()=>setTab(d.id)}><Icon name={d.icon} size={23}/>{d.label}</button>)}</nav>
    {editor}{catMgr}{authModal}{settingsModal}
    <UndoToast task={undoTask} onUndo={root.undoDelete} onDismiss={root.dismissUndo}/>
  </div>;
}

/* ---- AppRoot ---- */
const LS_NAME='wp_name';
function AppRoot(){
  const[dark,setDark]=React.useState(()=>lsLoad(LS_DARK,false));
  const[tasks,setTasks]=React.useState(()=>lsLoad(LS_TASKS,DEFAULT_SEED));
  const[categories,setCategories]=React.useState(()=>lsLoad(LS_CATS,DEFAULT_CATEGORIES));
  const[session,setSession]=React.useState(null);const[authLoading,setAuthLoading]=React.useState(IS_SUPABASE);
  const[syncStatus,setSyncStatus]=React.useState('off');
  const[displayName,setDisplayNameState]=React.useState(()=>lsLoad(LS_NAME,'')||'');
  const[showAuth,setShowAuth]=React.useState(false);
  const[settings,setSettingsState]=React.useState(()=>({...DEFAULT_SETTINGS,...lsLoad(LS_SETTINGS,{})}));
  const[streak,setStreak]=React.useState(readStreak);
  const[undoTask,setUndoTask]=React.useState(null);
  const undoTaskRef=React.useRef(null);const undoTimer=React.useRef(null);
  React.useEffect(()=>{undoTaskRef.current=undoTask;},[undoTask]);
  const syncTimer=React.useRef(null);
  const sessionRef=React.useRef(session);
  React.useEffect(()=>{sessionRef.current=session;},[session]);

  // keep CATEGORIES global in sync via effect (not during render)
  React.useEffect(()=>{CATEGORIES=categories;},[categories]);

  // midnight auto-reload so TODAY stays accurate
  React.useEffect(()=>{const now=new Date();const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now;const t=setTimeout(()=>window.location.reload(),ms);return()=>clearTimeout(t);},[]);

  // send notifications on mount
  React.useEffect(()=>{
    if(!settings.notificationsEnabled||!('Notification' in window)||Notification.permission!=='granted')return;
    const overdue=tasks.filter(t=>!taskDone(t)&&bucketOf(t)==='overdue').length;
    const today=tasks.filter(t=>!taskDone(t)&&bucketOf(t)==='today').length;
    if(overdue>0)new Notification('Work Planner',{body:`${overdue} overdue task${overdue>1?'s':''}`,icon:'icon.png'});
    else if(today>0)new Notification('Work Planner',{body:`${today} task${today>1?'s':''} due today`,icon:'icon.png'});
  },[]);

  // auth
  React.useEffect(()=>{
    if(!IS_SUPABASE){setAuthLoading(false);return;}
    const timeout=setTimeout(()=>setAuthLoading(false),5000);
    const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      clearTimeout(timeout);
      setSession(session);
      if(session)loadRemote(session.user.id);
      else setAuthLoading(false);
    });
    return()=>{subscription.unsubscribe();clearTimeout(timeout);};
  },[]);

  const loadRemote=async uid=>{
    setSyncStatus('busy');
    try{
      const{data:userData}=await sb.auth.getUser();
      const metaName=userData?.user?.user_metadata?.display_name;
      if(metaName){setDisplayNameState(metaName);lsSave(LS_NAME,metaName);}
      const{data}=await sb.from('user_data').select('tasks,categories').eq('user_id',uid).maybeSingle();
      if(data){
        if(data.tasks?.length){setTasks(data.tasks);lsSave(LS_TASKS,data.tasks);}
        if(data.categories?.length){setCategories(data.categories);lsSave(LS_CATS,data.categories);}
      }
      setSyncStatus('ok');
    }catch{setSyncStatus('off');}
    finally{setAuthLoading(false);}
  };

  const scheduleSync=(newTasks,newCats)=>{
    if(!IS_SUPABASE||!sessionRef.current)return;
    const uid=sessionRef.current.user.id;
    setSyncStatus('busy');
    if(syncTimer.current)clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{
      try{
        const{error}=await sb.from('user_data').upsert({user_id:uid,tasks:newTasks,categories:newCats,updated_at:new Date().toISOString()});
        setSyncStatus(error?'off':'ok');
      }catch{setSyncStatus('off');}
    },1500);
  };

  const[isMobile,setIsMobile]=React.useState(window.innerWidth<768);
  React.useEffect(()=>{const r=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',r);return()=>window.removeEventListener('resize',r);},[]);

  const setDisplayName=name=>{setDisplayNameState(name);lsSave(LS_NAME,name);};
  const saveSettings=s=>{setSettingsState(s);lsSave(LS_SETTINGS,s);};

  const refreshStreak=()=>setStreak(bumpStreak());

  const root=React.useMemo(()=>({
    setDark:v=>{setDark(v);lsSave(LS_DARK,v);},
    openAuth:()=>setShowAuth(true),
    refresh:()=>{if(IS_SUPABASE&&sessionRef.current)loadRemote(sessionRef.current.user.id);},
    signOut:async()=>{if(IS_SUPABASE)await sb.auth.signOut();setSession(null);},
    toggleTask:id=>setTasks(ts=>{
      const n=ts.map(x=>{
        if(x.id!==id)return x;
        const hasSubs=x.subtasks&&x.subtasks.length;
        const isDone=hasSubs?x.subtasks.every(s=>s.done):x.done;
        // completing a recurring task: advance due date, keep active
        if(!isDone&&x.recurring&&x.recurring!=='none'){
          const newDue=nextRecurDate(x.due||TODAY_STR,x.recurring);
          if(hasSubs)return{...x,subtasks:x.subtasks.map(s=>({...s,done:false})),done:false,due:newDue};
          return{...x,done:false,due:newDue};
        }
        if(hasSubs){const all=x.subtasks.every(s=>s.done);return{...x,subtasks:x.subtasks.map(s=>({...s,done:!all})),done:!all};}
        return{...x,done:!x.done};
      });
      lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);
      // bump streak if any task just got completed
      const wasCompleted=n.some((x,i)=>taskDone(x)&&!taskDone(ts[i]||{}));
      if(wasCompleted)refreshStreak();
      return n;
    }),
    toggleSub:(id,sid)=>setTasks(ts=>{const n=ts.map(x=>{if(x.id!==id)return x;const subtasks=x.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s);return{...x,subtasks,done:subtasks.every(s=>s.done)};});lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);return n;}),
    addSub:(id,title)=>setTasks(ts=>{const n=ts.map(x=>x.id===id?{...x,subtasks:[...x.subtasks,{id:uid(),title,due:null,done:false}],done:false}:x);lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);return n;}),
    deleteTask:id=>setTasks(ts=>{
      const task=ts.find(x=>x.id===id);
      const n=ts.filter(x=>x.id!==id);
      lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);
      if(undoTimer.current)clearTimeout(undoTimer.current);
      setUndoTask(task);
      undoTimer.current=setTimeout(()=>setUndoTask(null),5000);
      return n;
    }),
    undoDelete:()=>{
      const task=undoTaskRef.current;if(!task)return;
      clearTimeout(undoTimer.current);setUndoTask(null);
      setTasks(ts=>{const n=[task,...ts];lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);return n;});
    },
    dismissUndo:()=>{clearTimeout(undoTimer.current);setUndoTask(null);},
    duplicateTask:id=>setTasks(ts=>{
      const orig=ts.find(x=>x.id===id);if(!orig)return ts;
      const copy={...orig,id:uid(),title:orig.title+' (copy)',done:false,subtasks:(orig.subtasks||[]).map(s=>({...s,id:uid(),done:false}))};
      const n=[...ts,copy];lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);return n;
    }),
    saveTask:task=>setTasks(ts=>{const n=task.id&&ts.some(x=>x.id===task.id)?ts.map(x=>x.id===task.id?task:x):[{...task,id:task.id||uid()},...ts];lsSave(LS_TASKS,n);scheduleSync(n,CATEGORIES);return n;}),
    saveCategories:newCats=>{
      const validIds=new Set(newCats.map(c=>c.id));const fallback=newCats.find(c=>!c.parentId)?.id;
      setTasks(ts=>{const n=ts.map(t=>validIds.has(t.categoryId)?t:{...t,categoryId:fallback});lsSave(LS_TASKS,n);scheduleSync(n,newCats);return n;});
      setCategories(newCats);lsSave(LS_CATS,newCats);
    },
  }),[session]);

  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--ink-3)',fontFamily:'var(--font)',fontSize:14}}>Loading…</div>;

  return<PlannerSurface formFactor={isMobile?'mobile':'desktop'} tasks={tasks} dark={dark} streak={streak} undoTask={undoTask} syncStatus={syncStatus} session={session} displayName={displayName} showAuth={showAuth} setShowAuth={setShowAuth} setDisplayName={setDisplayName} settings={settings} saveSettings={saveSettings} root={root}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot/>);
</script>
</body>
</html>
