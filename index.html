<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Work Planner"/>
<title>Work Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--font:"Poppins",-apple-system,system-ui,sans-serif;--bg:#FDECD0;--surface:#FFFFFF;--surface-2:#FEF5E4;--line:#F0D8B0;--line-soft:#F7E8CC;--ink:#1A1A2E;--ink-2:#6A6A8A;--ink-3:#9E9EBB;--accent:#1B6B5C;--accent-ink:color-mix(in oklab,var(--accent),black 12%);--accent-soft:color-mix(in oklab,var(--accent) 14%,#FEF5E4);--accent-on:#fff;--amber:#F5A623;--amber-ink:#B07015;--amber-soft:#FEF0D0;--red:#E8543A;--red-ink:#C03020;--red-soft:#FDE8E4;--green:#2BAB7C;--green-soft:#CFF2E6;--blue:#5B7ED4;--blue-soft:#E8EDFA;--r-xs:8px;--r-sm:12px;--r-md:16px;--r-lg:24px;--r-xl:32px;--sh-1:0 2px 8px rgba(160,100,30,.09),0 1px 3px rgba(160,100,30,.05);--sh-2:0 6px 20px rgba(160,100,30,.13),0 2px 8px rgba(160,100,30,.07);--sh-3:0 12px 36px rgba(160,100,30,.18),0 4px 14px rgba(160,100,30,.1);--sh-pop:0 24px 64px rgba(80,45,10,.24),0 8px 24px rgba(80,45,10,.14)}
.surface.dark{--bg:#1E1A14;--surface:#2A2318;--surface-2:#332B1C;--line:#4A3C2A;--line-soft:#3D3120;--ink:oklch(0.95 0.012 78);--ink-2:oklch(0.74 0.02 75);--ink-3:oklch(0.57 0.02 75);--accent-soft:color-mix(in oklab,var(--accent) 22%,var(--surface));--accent-ink:color-mix(in oklab,var(--accent),white 36%);--amber-soft:#3A2C10;--red-soft:#3A1814;--green-soft:#143020;--blue-soft:#1C2440;--sh-1:0 2px 8px rgba(0,0,0,.35);--sh-2:0 6px 20px rgba(0,0,0,.5);--sh-3:0 14px 38px rgba(0,0,0,.65);--sh-pop:0 30px 72px rgba(0,0,0,.75)}
*{box-sizing:border-box;margin:0;padding:0}html,body,#root{height:100%}body{background:var(--bg)}
.surface{font-family:var(--font);color:var(--ink);background:var(--bg);height:100%;width:100%;display:flex;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
.surface,.surface *{font-family:var(--font)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
.scroll{overflow-y:auto;overflow-x:hidden}.scroll::-webkit-scrollbar{width:10px}.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;border:3px solid transparent;background-clip:content-box}.scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-3);background-clip:content-box}
/* sidebar */
.desktop .sidebar{width:272px;flex-shrink:0;background:var(--bg);border-right:none;box-shadow:2px 0 16px rgba(160,100,30,.08);display:flex;flex-direction:column;padding:20px 14px 20px;gap:2px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:2px 10px 18px}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;flex-shrink:0;box-shadow:var(--sh-1)}
.brand-name{font-weight:700;font-size:17px;letter-spacing:-.02em;white-space:nowrap}
.brand-sub{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:1px;white-space:nowrap}
/* profile card */
.profile-card{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-1);margin-bottom:18px;flex-shrink:0}
.sidebar-avatar{width:42px;height:42px;border-radius:50%;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0;cursor:pointer;transition:opacity .12s;border:none;box-shadow:0 0 0 3px #F4A7A3,0 0 0 5.5px var(--surface)}
.surface.dark .sidebar-avatar{box-shadow:0 0 0 3px #8B4A60,0 0 0 5.5px var(--surface)}
.sidebar-avatar:hover{opacity:.86}
.profile-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.profile-sub{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:4px;margin-top:2px;font-weight:500}
/* status section */
.status-section{display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.status-row{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:var(--r-md);transition:background .12s}
.status-row:hover{background:color-mix(in oklab,var(--surface) 70%,transparent)}
.status-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.status-info{display:flex;flex-direction:column;gap:1px}
.status-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.2}
.status-cnt{font-size:11px;color:var(--ink-3);font-weight:500}
/* nav */
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-md);font-size:14px;font-weight:600;color:var(--ink-2);text-align:left;width:100%;transition:background .12s,color .12s}
.nav-item:hover{background:color-mix(in oklab,var(--surface) 70%,transparent);color:var(--ink)}.nav-item.active{background:var(--accent);color:#fff;box-shadow:var(--sh-1)}
.nav-item.active .count{color:rgba(255,255,255,.8)}.nav-item .count{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--ink-3)}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);padding:14px 11px 6px;display:flex;align-items:center;gap:4px}
.nav-label-text{flex:1}
.sidebar:hover .nav-label .mini-btn{opacity:1}.nav-label .mini-btn{opacity:0;transition:opacity .12s}
.cat-row-wrap{display:flex;align-items:center;border-radius:var(--r-md);transition:background .12s}.cat-row-wrap:hover{background:color-mix(in oklab,var(--surface) 70%,transparent)}.cat-row-wrap.active{background:color-mix(in oklab,var(--surface) 70%,transparent)}
.cat-chevron-btn{width:24px;min-height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);color:var(--ink-3);flex-shrink:0;padding:0}
.cat-chevron-btn:hover{background:color-mix(in oklab,var(--line) 50%,transparent)}
.cat-row-btn{display:flex;align-items:center;gap:9px;padding:7px 8px 7px 2px;font-size:14px;font-weight:600;color:var(--ink-2);flex:1;text-align:left;border-radius:var(--r-sm)}
.cat-row-wrap.active .cat-row-btn{color:var(--ink)}
.cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-row-btn .count{margin-left:auto;font-size:12px;color:var(--ink-3);font-weight:600}
.sub-badge{background:var(--accent-soft);color:var(--accent-ink);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:2px;white-space:nowrap}
.subcat-row{display:flex;align-items:center;gap:9px;padding:6px 11px 6px 30px;border-radius:var(--r-md);font-size:13.5px;font-weight:500;color:var(--ink-3);width:100%;text-align:left;transition:background .12s}
.subcat-row:hover{background:color-mix(in oklab,var(--surface) 70%,transparent);color:var(--ink-2)}.subcat-row.active{background:color-mix(in oklab,var(--surface) 70%,transparent);color:var(--ink)}
.subcat-row .count{margin-left:auto;font-size:11.5px;color:var(--ink-3);font-weight:600}
.sidebar-foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r-md);background:var(--surface-2)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0;cursor:pointer;transition:opacity .12s;border:none}
.avatar:hover{opacity:.82}
.avatar.logged-in{box-shadow:0 0 0 2px var(--accent),0 0 0 4px var(--surface-2)}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}.sync-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.off{background:var(--ink-3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:14px;padding:20px 30px 14px}
.page-title{font-size:28px;font-weight:800;letter-spacing:-.035em}
.page-sub{font-size:13px;color:var(--ink-3);font-weight:500;margin-top:3px;white-space:nowrap}
.topbar-spacer{flex:1}
.search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1.5px solid var(--line);border-radius:99px;padding:8px 16px;width:240px;color:var(--ink-3);box-shadow:var(--sh-1)}
.search input{border:none;background:none;outline:none;flex:1;font-size:13.5px;color:var(--ink);min-width:0}
.search input::placeholder{color:var(--ink-3)}
.icon-btn{width:38px;height:38px;border-radius:99px;display:grid;place-items:center;color:var(--ink-2);background:var(--surface);border:1.5px solid var(--line);transition:background .12s,color .12s;box-shadow:var(--sh-1)}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:99px;font-size:14px;font-weight:600;transition:transform .08s,filter .12s,background .12s;white-space:nowrap}
.btn:active{transform:translateY(1px)}.btn-primary{background:var(--accent);color:var(--accent-on);box-shadow:var(--sh-1)}.btn-primary:hover{filter:brightness(1.08)}.btn-ghost{background:var(--surface);border:1.5px solid var(--line);color:var(--ink)}.btn-ghost:hover{background:var(--surface-2)}.btn svg{width:16px;height:16px}
.toolbar{display:flex;align-items:center;gap:10px;padding:6px 30px 14px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:3px;gap:2px}
.seg button{padding:6px 13px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;transition:color .12s}.seg button svg{width:15px;height:15px}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh-1)}
.chip-toggle{padding:7px 13px;border-radius:99px;font-size:13px;font-weight:600;color:var(--ink-2);background:var(--surface);border:1px solid var(--line)}.chip-toggle.on{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.content{flex:1;min-height:0}.content-pad{padding:4px 30px 40px}
/* tasks */
.task-group-head{display:flex;align-items:center;gap:9px;margin:22px 2px 11px}.task-group-head:first-child{margin-top:6px}
.task-group-title{font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--ink-2)}
.task-group-count{font-size:12px;font-weight:600;color:var(--ink-3);background:var(--surface-2);padding:1px 9px;border-radius:99px}
.task-group-line{flex:1;height:1px;background:var(--line-soft)}
.tasklist{display:flex;flex-direction:column;gap:10px}.tasklist.rows{gap:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-1)}
.task{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-1);transition:box-shadow .14s,border-color .14s,transform .1s;position:relative}
.task:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}.rows .task{border-radius:0;border:none;border-bottom:1px solid var(--line-soft);box-shadow:none;padding:14px 18px;transform:none}.rows .task:last-child{border-bottom:none}.rows .task:hover{background:var(--surface-2);transform:none}
.task.done{opacity:.6}.task.overdue{border-left:4px solid var(--red)}.task.due-soon{border-left:4px solid var(--amber)}
.task-main{display:flex;align-items:flex-start;gap:13px}
.check{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid var(--line);background:var(--surface);display:grid;place-items:center;color:#fff;transition:background .14s,border-color .14s}
.check svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:opacity .12s,transform .14s}.check:hover{border-color:var(--accent)}.check.on{background:var(--green);border-color:var(--green)}.check.on svg{opacity:1;transform:scale(1)}.check.sm{width:18px;height:18px}.check.sm svg{width:11px;height:11px}
.task-body{flex:1;min-width:0}.task-titlerow{display:flex;align-items:center;gap:9px}
.task-title{font-size:15px;font-weight:600;letter-spacing:-.01em;line-height:1.35;color:var(--ink)}.task.done .task-title{text-decoration:line-through;text-decoration-color:var(--ink-3)}
.task-notes{font-size:13px;color:var(--ink-3);margin-top:3px;line-height:1.45}
.meta-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:650}
.chip svg{width:12px;height:12px}.chip-date{background:var(--surface-2);color:var(--ink-2)}.chip-date.due-soon{background:var(--amber-soft);color:var(--amber-ink)}.chip-date.overdue{background:var(--red-soft);color:var(--red-ink)}.chip-attach{background:var(--surface-2);color:var(--ink-2)}.chip-recur{background:var(--surface-2);color:var(--ink-2)}
.flag{width:8px;height:8px;border-radius:2.5px;flex-shrink:0}.flag.high{background:var(--red)}.flag.med{background:var(--amber)}.flag.low{background:var(--ink-3)}
.progress{display:flex;align-items:center;gap:9px;margin-top:11px}.bar{flex:1;height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden}.bar>span{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .35s cubic-bezier(.4,0,.2,1)}.bar.full>span{background:var(--green)}.progress-num{font-size:11.5px;font-weight:650;color:var(--ink-3);min-width:30px;text-align:right}
.subtasks{margin-top:12px;padding-top:11px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:2px;margin-left:35px}
.subtask{display:flex;align-items:center;gap:10px;padding:5px 0}.subtask-title{font-size:13.5px;color:var(--ink-2);flex:1}.subtask.done .subtask-title{text-decoration:line-through;color:var(--ink-3)}.subtask-date{font-size:11px;font-weight:600;color:var(--ink-3)}.subtask-date.due-soon{color:var(--amber-ink)}.subtask-date.overdue{color:var(--red-ink)}
.subtask-toggle{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12.5px;font-weight:600;color:var(--accent-ink);border-radius:var(--r-sm);padding:5px 10px 5px 8px;background:var(--accent-soft);transition:filter .12s;width:fit-content}.subtask-toggle:hover{filter:brightness(.95)}.subtask-toggle svg{width:14px;height:14px;flex-shrink:0}
.add-sub{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-3);font-weight:600;padding:5px 0}.add-sub:hover{color:var(--accent-ink)}
.task-actions{display:flex;gap:3px;align-items:center;opacity:0;transition:opacity .12s}.task:hover .task-actions{opacity:1}
.mini-btn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--ink-3)}.mini-btn:hover{background:var(--surface-2);color:var(--ink)}.mini-btn svg{width:16px;height:16px}
/* calendar */
.cal-head{display:flex;align-items:center;gap:14px;padding:4px 0 16px}.cal-month{font-size:21px;font-weight:700;letter-spacing:-.02em;min-width:178px}.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-1)}
.cal-dow{padding:11px 12px;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--line);text-align:left}
.cal-cell{min-width:0;min-height:116px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:8px;display:flex;flex-direction:column;gap:5px;transition:background .12s}
.cal-cell:nth-child(7n){border-right:none}.cal-cell.out{background:var(--surface-2)}.cal-cell:hover{background:var(--surface-2)}
.cal-daynum{font-size:13px;font-weight:650;color:var(--ink-2);width:25px;height:25px;display:grid;place-items:center;border-radius:50%}
.cal-cell.out .cal-daynum{color:var(--ink-3)}.cal-cell.today .cal-daynum{background:var(--accent);color:var(--accent-on)}
.cal-event{font-size:11.5px;font-weight:600;padding:3px 7px;border-radius:6px;white-space:normal;word-break:break-word;display:flex;align-items:flex-start;gap:5px;line-height:1.4;text-align:left;width:100%}
.cal-event .ev-dot{margin-top:3px}
.cal-event .ev-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}.cal-event.done{opacity:.5;text-decoration:line-through}.cal-event.overdue{background:var(--red-soft);color:var(--red-ink)}.cal-more{font-size:10.5px;font-weight:600;color:var(--ink-3);padding-left:7px}
.agenda{display:flex;flex-direction:column;gap:2px}.agenda-day{display:flex;gap:18px;padding:14px 0;border-bottom:1px solid var(--line-soft)}.agenda-date{width:86px;flex-shrink:0;text-align:right}.agenda-dow{font-size:12px;font-weight:650;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em}.agenda-num{font-size:27px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-top:3px}.agenda-day.today .agenda-num{color:var(--accent-ink)}.agenda-items{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.timeline{display:flex;flex-direction:column}.tl-row{display:grid;grid-template-columns:92px 1fr;gap:16px;padding:7px 0;align-items:center}.tl-label{text-align:right;font-size:12.5px;font-weight:650;color:var(--ink-3)}.tl-track{position:relative;height:34px;background:var(--surface-2);border-radius:99px}.tl-bar{position:absolute;top:5px;height:24px;border-radius:99px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:650;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:var(--sh-1)}.tl-scale{display:grid;grid-template-columns:92px 1fr;gap:16px;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:6px}.tl-scale-inner{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--ink-3)}
/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:4px 30px 8px}
.stat{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-1)}.stat-num{font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1}.stat-label{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:6px}.stat.amber .stat-num{color:var(--amber-ink)}.stat.red .stat-num{color:var(--red-ink)}.stat.green .stat-num{color:var(--green)}
/* modal */
.scrim{position:absolute;inset:0;background:rgba(20,22,45,.42);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease}
.mobile .scrim{align-items:flex-end;padding:0}
@keyframes fade{from{opacity:0}}@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}}@keyframes sheet{from{transform:translateY(100%)}}
.modal{background:var(--surface);border-radius:var(--r-xl);width:540px;max-width:100%;max-height:90%;display:flex;flex-direction:column;box-shadow:var(--sh-pop);animation:pop .18s cubic-bezier(.2,.7,.3,1);overflow:hidden}
.mobile .modal{width:100%;border-radius:28px 28px 0 0;max-height:92%;animation:sheet .26s cubic-bezier(.2,.7,.3,1)}
.modal-head{display:flex;align-items:center;gap:12px;padding:22px 24px 18px;background:var(--bg);border-bottom:1px solid var(--line)}.modal-head h3{font-size:20px;font-weight:800;letter-spacing:-.03em;flex:1}
.modal-body{padding:18px 20px;gap:16px;display:flex;flex-direction:column}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;align-items:center}
.field{display:flex;flex-direction:column;gap:7px}.field-label{font-size:12px;font-weight:700;color:var(--ink-2);letter-spacing:.01em}
.input,.textarea,.select{width:100%;background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--r-md);padding:11px 13px;font-size:14.5px;color:var(--ink);outline:none;transition:border-color .12s,background .12s}
.input::placeholder,.textarea::placeholder{color:var(--ink-3)}.input:focus,.textarea:focus,.select:focus{border-color:var(--accent);background:var(--surface)}.input.title-input{font-size:17px;font-weight:600}.textarea{resize:none;min-height:60px;line-height:1.5}.field-row{display:flex;gap:12px}.field-row>.field{flex:1}
.opt-row{display:flex;gap:8px;flex-wrap:wrap}
.opt{padding:8px 13px;border-radius:var(--r-md);font-size:13px;font-weight:600;background:var(--surface-2);border:1.5px solid var(--line);color:var(--ink-2);display:inline-flex;align-items:center;gap:7px}.opt:hover{border-color:var(--ink-3)}.opt.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}.opt .flag{width:9px;height:9px}.opt .cat-dot{width:9px;height:9px}
.sub-edit{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--r-sm);background:var(--surface-2)}.sub-edit input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--ink)}.sub-edit .sub-date-btn{font-size:11.5px;font-weight:600;color:var(--ink-3);padding:4px 8px;border-radius:7px;background:var(--surface);border:1px solid var(--line)}.sub-edit .sub-date-btn.set{color:var(--accent-ink)}
.attach-list{display:flex;flex-direction:column;gap:8px}.attach{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-md);background:var(--surface-2);border:1px solid var(--line)}.attach-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}.attach-ic.file{background:var(--accent-soft);color:var(--accent-ink)}.attach-ic.link{background:var(--green-soft);color:var(--green)}.attach-ic.image{background:var(--amber-soft);color:var(--amber-ink)}.attach-ic svg{width:17px;height:17px}.attach-name{font-size:13.5px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.attach-meta{font-size:11.5px;color:var(--ink-3)}.add-attach-row{display:flex;gap:8px}
/* mobile */
.mobile{flex-direction:column;background:var(--bg)}.m-header{padding:max(env(safe-area-inset-top),18px) 18px 10px;display:flex;align-items:flex-end;gap:10px}.m-title{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1.05;white-space:nowrap}.m-sub{font-size:12.5px;color:var(--ink-3);font-weight:500;margin-top:3px;white-space:nowrap}.m-header-spacer{flex:1}
.m-content{flex:1;min-height:0;padding:0 16px 12px}
.m-search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 13px;margin:0 16px 12px;color:var(--ink-3)}.m-search input{border:none;background:none;outline:none;flex:1;font-size:14px;color:var(--ink);min-width:0}
.m-filters{display:flex;gap:8px;padding:0 16px 8px;overflow-x:auto}.m-filters::-webkit-scrollbar{display:none}
.m-chip{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);display:inline-flex;align-items:center;gap:7px;flex-shrink:0}.m-chip.on{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}.m-chip .cat-dot{width:9px;height:9px}
.m-subcats{display:flex;gap:6px;padding:0 16px 10px 24px;overflow-x:auto}.m-subcats::-webkit-scrollbar{display:none}
.m-subchip{padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;background:var(--surface-2);border:1px solid var(--line-soft);color:var(--ink-3);display:inline-flex;align-items:center;gap:6px;flex-shrink:0}.m-subchip.on{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}.m-subchip .cat-dot{width:7px;height:7px}
.m-stats{display:flex;gap:9px;padding:0 16px 14px}.m-stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:11px 12px;box-shadow:var(--sh-1)}.m-stat-num{font-size:21px;font-weight:700;letter-spacing:-.03em;line-height:1}.m-stat-label{font-size:10.5px;color:var(--ink-3);font-weight:600;margin-top:5px}.m-stat.amber .m-stat-num{color:var(--amber-ink)}.m-stat.red .m-stat-num{color:var(--red-ink)}
.tabbar{display:flex;padding:8px 14px max(env(safe-area-inset-bottom),14px);background:var(--surface);border-top:1px solid var(--line);gap:4px;position:relative;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;color:var(--ink-3);font-size:10.5px;font-weight:650}.tab svg{width:23px;height:23px}.tab.active{color:var(--accent-ink)}
.fab-wrap{position:absolute;top:-28px;left:50%;transform:translateX(-50%)}.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;box-shadow:var(--sh-3);transition:transform .1s}.fab:active{transform:scale(.94)}
.mobile .cal-cell{min-height:0;aspect-ratio:1;padding:4px;align-items:center;gap:2px}.mobile .cal-daynum{font-size:12px;width:26px;height:26px}.mobile .cal-dots{display:flex;gap:3px}.mobile .cal-dots .ev-dot{width:5px;height:5px;border-radius:99px}.mobile .cal-dow{padding:8px 0;text-align:center;font-size:10px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--ink-3);gap:12px}.empty-ic{width:56px;height:56px;border-radius:18px;background:var(--surface-2);display:grid;place-items:center}.empty-ic svg{width:26px;height:26px}.empty h4{font-size:16px;font-weight:650;color:var(--ink-2)}.empty p{font-size:13.5px;max-width:280px;line-height:1.5}
/* category manager */
.cat-edit-row{display:flex;align-items:center;gap:10px;padding:5px 0}.cat-color-btn{width:28px;height:28px;border-radius:8px;flex-shrink:0;cursor:pointer;transition:transform .1s}.cat-color-btn:hover{transform:scale(1.1)}
.color-picker-row{display:flex;align-items:center;gap:8px;padding:6px 0 6px 38px}.color-picker-row input[type=color]{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);padding:2px;cursor:pointer;background:var(--surface)}.color-picker-row .hex-input{width:96px;font-size:13px;font-family:monospace;padding:6px 9px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);outline:none}.color-picker-row .hex-input:focus{border-color:var(--accent)}
.subcat-indent{padding-left:22px}
/* login */
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:36px 32px;width:380px;max-width:100%;box-shadow:var(--sh-3);display:flex;flex-direction:column;gap:20px}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:4px}.login-mark{width:40px;height:40px;border-radius:12px;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;flex-shrink:0}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.02em}.login-sub{font-size:13.5px;color:var(--ink-3);margin-top:3px}
.login-err{background:var(--red-soft);color:var(--red-ink);padding:10px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600}
.login-footer{font-size:13px;color:var(--ink-3);text-align:center}.login-footer button{color:var(--accent-ink);font-weight:600;font-size:13px}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;border-radius:var(--r-md);border:1.5px solid var(--line);background:var(--surface);font-size:14px;font-weight:600;color:var(--ink);transition:background .12s,border-color .12s}.oauth-btn:hover:not(:disabled){background:var(--surface-2);border-color:var(--ink-3)}.oauth-btn:disabled{opacity:.5;cursor:not-allowed}.oauth-btn svg{flex-shrink:0}
.oauth-divider{display:flex;align-items:center;gap:12px;color:var(--ink-3);font-size:12.5px;font-weight:600}.oauth-divider::before,.oauth-divider::after{content:'';flex:1;height:1px;background:var(--line)}
.setup-box{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:16px;font-size:12.5px;line-height:1.7;color:var(--ink-2)}.setup-box code{background:var(--line-soft);padding:1px 5px;border-radius:4px;font-size:11.5px;font-family:ui-monospace,monospace}
/* toast */
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:oklch(0.22 0.01 275);color:#fff;padding:11px 16px;border-radius:var(--r-md);display:flex;align-items:center;gap:12px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-3);z-index:500;animation:slideUp .18s ease;white-space:nowrap}
.toast-undo{background:none;border:1.5px solid rgba(255,255,255,.35);color:#fff;padding:4px 12px;border-radius:var(--r-sm);font-size:12.5px;font-weight:700;cursor:pointer}.toast-undo:hover{background:rgba(255,255,255,.15)}
.toast-x{color:rgba(255,255,255,.5);padding:2px 4px;font-size:16px;line-height:1}.toast-x:hover{color:#fff}
/* bulk bar */
.bulk-bar{display:flex;align-items:center;gap:10px;padding:9px 30px;background:var(--accent-soft);border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--accent-ink);flex-shrink:0}
.mobile .bulk-bar{padding:9px 16px}
.bulk-count{flex:1}
/* task selected */
.task.selected{border-color:var(--accent);background:var(--accent-soft)}
.rows .task.selected{background:var(--accent-soft)}
/* select checkbox */
.sel-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);background:var(--surface);flex-shrink:0;display:grid;place-items:center;transition:all .12s;cursor:pointer;margin-top:2px}
.sel-box.on{background:var(--accent);border-color:var(--accent)}.sel-box.on::after{content:'';width:10px;height:10px;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' fill='none' stroke='white' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='2 6 5 9 10 3'/%3E%3C/svg%3E") center/contain no-repeat}
/* eisenhower matrix */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:2px 0 20px}
.mobile .matrix{grid-template-columns:1fr}
.matrix-quad{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-1);display:flex;flex-direction:column}
.matrix-quad-head{padding:11px 14px 9px;border-bottom:1px solid var(--line)}
.matrix-quad-title{font-size:13px;font-weight:700;color:var(--ink)}
.matrix-quad-sub{font-size:11px;color:var(--ink-3);margin-top:2px;font-weight:500}
.matrix-items{padding:6px;display:flex;flex-direction:column;gap:3px;flex:1;min-height:70px}
.matrix-task{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r-sm);text-align:left;font-size:13px;color:var(--ink);width:100%;transition:background .1s}.matrix-task:hover{background:var(--surface-2)}
.matrix-empty{font-size:12px;color:var(--ink-3);padding:10px;font-style:italic;text-align:center}
/* streak */
.streak-stat{background:linear-gradient(135deg,color-mix(in oklab,var(--accent) 18%,var(--surface)),var(--surface));border-color:color-mix(in oklab,var(--accent) 30%,var(--line))}
.streak-stat .stat-num{color:var(--accent-ink)}
/* weekly review */
.review-day{padding:14px 0;border-bottom:1px solid var(--line-soft)}
.review-day-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-day-label{font-size:12.5px;font-weight:700;color:var(--ink-2);min-width:90px}
.review-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.review-pill.done{background:var(--green-soft);color:oklch(0.46 0.1 150)}
.review-pill.miss{background:var(--red-soft);color:var(--red-ink)}
/* nl date hint */
.nl-hint{font-size:11px;color:var(--accent-ink);font-weight:600;margin-top:3px;height:14px}
/* color swatch row */
.swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.swatch{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:transform .1s}.swatch:hover{transform:scale(1.12)}.swatch.on{border-color:var(--ink)}
/* stats 5-col */
.stats-5{grid-template-columns:repeat(5,1fr)}
</style>

/* ---- data helpers ---- */
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WD_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseYmd=s=>{if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const TODAY_STR=ymd(TODAY);
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const dayDiff=(a,b)=>{const A=new Date(a.getFullYear(),a.getMonth(),a.getDate());const B=new Date(b.getFullYear(),b.getMonth(),b.getDate());return Math.round((B-A)/86400000);};
const fmtDate=s=>{const d=parseYmd(s);if(!d)return'';const diff=dayDiff(TODAY,d);if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';if(diff>1&&diff<=6)return DOW[d.getDay()];return`${MON_SHORT[d.getMonth()]} ${d.getDate()}`;};
const dateStatus=(s,done)=>{if(done)return'done';if(!s)return'none';const diff=dayDiff(TODAY,parseYmd(s));if(diff<0)return'overdue';if(diff<=2)return'soon';return'upcoming';};
const taskProgress=t=>{if(t.subtasks&&t.subtasks.length){const done=t.subtasks.filter(s=>s.done).length;return Math.round((done/t.subtasks.length)*100);}return t.done?100:0;};
const taskDone=t=>{if(t.subtasks&&t.subtasks.length)return t.subtasks.every(s=>s.done);return t.done;};
const taskStatus=t=>{if(taskDone(t))return'done';const dates=[t.due,...(t.subtasks||[]).filter(s=>!s.done).map(s=>s.due)].filter(Boolean);let best='none';const rank={overdue:3,soon:2,upcoming:1,none:0};for(const d of dates){const st=dateStatus(d,false);if(rank[st]>rank[best])best=st;}return best;};
const uid=()=>`t${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}`;

};

const bucketOf=t=>{if(taskDone(t))return'done';if(!t.due)return'nodate';const diff=dayDiff(TODAY,parseYmd(t.due));if(diff<0)return'overdue';if(diff===0)return'today';if(diff<=7)return'week';return'later';};
const PRANK={high:0,med:1,low:2,null:3,undefined:3};
const cmpDue=(x,y)=>{if(!x.due&&!y.due)return 0;if(!x.due)return 1;if(!y.due)return-1;return x.due<y.due?-1:x.due>y.due?1:0;};
const sortTasks=(arr,sort)=>{const a=[...arr];if(sort==='priority')a.sort((x,y)=>(PRANK[x.priority]-PRANK[y.priority])||cmpDue(x,y));else a.sort(cmpDue);return a;};

/* ---- recurring helpers ---- */
const nextRecurDate=(due,recur)=>{const d=parseYmd(due||TODAY_STR);if(!d)return due;if(recur==='daily')return ymd(addDays(d,1));if(recur==='weekly')return ymd(addDays(d,7));if(recur==='monthly'){const n=new Date(d);n.setMonth(n.getMonth()+1);return ymd(n);}return due;};

/* ---- natural language date ---- */
const parseNatural=s=>{if(!s)return null;const t=s.toLowerCase().trim();const now=new Date();now.setHours(0,0,0,0);if(t==='today')return ymd(now);if(t==='tomorrow'||t==='tmr')return ymd(addDays(now,1));if(t==='yesterday')return ymd(addDays(now,-1));if(t==='next week')return ymd(addDays(now,7));const inN=t.match(/^in (\d+) days?$/);if(inN)return ymd(addDays(now,parseInt(inN[1])));const DAYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];const short=['sun','mon','tue','wed','thu','fri','sat'];let name=t.replace(/^next\s+/,'');let idx=DAYS.indexOf(name);if(idx<0)idx=short.indexOf(name);if(idx>=0){let diff=idx-now.getDay();if(diff<=0)diff+=7;return ymd(addDays(now,diff));}return null;};

function eventsFor(tasks){const ev=[];tasks.forEach(t=>{const cat=catById(t.categoryId);if(t.due)ev.push({date:t.due,title:t.title,taskId:t.id,cat,done:taskDone(t),status:taskStatus(t),kind:'task'});(t.subtasks||[]).forEach(s=>{if(s.due)ev.push({date:s.due,title:s.title,taskId:t.id,cat,done:s.done,status:dateStatus(s.due,s.done),kind:'sub',parent:t.title});});});return ev;}
function byDay(events){const m={};events.forEach(e=>{(m[e.date]=m[e.date]||[]).push(e);});return m;}

function MonthGrid({tasks,monthDate,onEdit,vibrant,mono,mobile,selected,setSelected}){

  const first=new Date(y,m,1),gridStart=addDays(first,-first.getDay());

function TimelineView({tasks,onEdit,vibrant,dark,mono,mobile}){

  return<div className={`task${done?' done':''}${cls}${selected?' selected':''}`}><div className="task-main">
    {bulkMode&&<button className={`sel-box${selected?' on':''}`} onClick={e=>{e.stopPropagation();onSelect&&onSelect(task.id);}} aria-label="Select task"/>}
    {!bulkMode&&<Checkbox checked={done} onClick={()=>onToggleTask(task.id)}/>}<div className="task-body"><div className="task-titlerow"><PriorityTag p={task.priority}/><span className="task-title">{task.title}</span></div>{task.notes&&<div className="task-notes">{task.notes}</div>}<div className="meta-row"><CategoryChip cat={cat} vibrant={vibrant} dark={dark} mono={mono}/><DateChip due={task.due} done={done}/>{task.recurring&&task.recurring!=='none'&&<span className="chip chip-recur"><Icon name="repeat" size={12}/>{task.recurring[0].toUpperCase()+task.recurring.slice(1)}</span>}{task.attachments&&task.attachments.length>0&&<span className="chip chip-attach"><Icon name="paperclip" size={12}/>{task.attachments.length}</span>}</div>{hasSubs&&<ProgressBar value={progress}/>}{subtaskMode==='collapsible'&&hasSubs&&<button className="subtask-toggle" onClick={()=>setOpen(o=>!o)}><Icon name={open?'chevronD':'chevronR'} size={14}/>{open?'Hide':'Show'} {task.subtasks.length} subtask{task.subtasks.length!==1?'s':''}<span style={{opacity:.7,fontWeight:500}}> · {task.subtasks.filter(s=>s.done).length}/{task.subtasks.length} done</span></button>}{showSubs&&<div className="subtasks">{task.subtasks.map(s=>{const sst=dateStatus(s.due,s.done);return<div key={s.id} className={`subtask${s.done?' done':''}`}><Checkbox small checked={s.done} onClick={()=>onToggleSub(task.id,s.id)}/><span className="subtask-title">{s.title}</span>{s.due&&<span className={`subtask-date${sst==='overdue'?' overdue':sst==='soon'?' due-soon':''}`}>{fmtDate(s.due)}</span>}</div>;})} {adding?<div className="sub-edit" style={{marginTop:4}}><Checkbox small checked={false} onClick={()=>{}}/><input autoFocus value={newSub} placeholder="New subtask…" onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addSub();if(e.key==='Escape'){setAdding(false);setNewSub('');}}} onBlur={()=>{addSub();setAdding(false);}}/></div>:<button className="add-sub" onClick={()=>setAdding(true)}><Icon name="plus" size={13}/>Add subtask</button>}</div>}</div><div className="task-actions"><button className="mini-btn" onClick={()=>onEdit(task.id)} title="Edit"><Icon name="edit" size={16}/></button><button className="mini-btn" onClick={()=>onDuplicate&&onDuplicate(task.id)} title="Duplicate"><Icon name="copy" size={16}/></button><button className="mini-btn" onClick={()=>onDelete(task.id)} title="Delete"><Icon name="trash" size={16}/></button></div></div></div>;
}

const BUCKETS=[{id:'overdue',label:'Overdue'},{id:'today',label:'Today'},{id:'week',label:'This week'},{id:'later',label:'Later'},{id:'nodate',label:'No date'},{id:'done',label:'Completed'}];

function TaskList({tasks,layout,sort,vibrant,dark,mono,subtaskMode,handlers}){
  if(!tasks.length)return<EmptyState icon="check" title="Nothing here yet" sub="You're all caught up. Add a task or adjust your filters."/>;
  let groups;
  if(layout==='grouped'){
    groups=CATEGORIES.filter(c=>!c.parentId).flatMap(c=>{
      const topItems=sortTasks(tasks.filter(t=>t.categoryId===c.id),sort);
      const childGroups=catChildren(c.id).map(sc=>({key:sc.id,label:`${c.name} / ${sc.name}`,dot:catDotColor(sc,vibrant,mono),items:sortTasks(tasks.filter(t=>t.categoryId===sc.id),sort)})).filter(g=>g.items.length);
      const top=topItems.length?[{key:c.id,label:c.name,dot:catDotColor(c,vibrant,mono),items:topItems}]:[];
      return[...top,...childGroups];
    }).filter(g=>g.items.length);
  } else {
    groups=BUCKETS.map(b=>({key:b.id,label:b.label,items:sortTasks(tasks.filter(t=>bucketOf(t)===b.id),sort)})).filter(g=>g.items.length);
  }
  const isRows=layout==='rows';
  const{selectedIds,bulkMode,...taskHandlers}=handlers;
  return<div>{groups.map(g=><div key={g.key}><div className="task-group-head">{g.dot&&<span className="cat-dot" style={{width:10,height:10,background:g.dot}}/>}<span className="task-group-title">{g.label}</span><span className="task-group-count">{g.items.length}</span><span className="task-group-line"/></div><div className={`tasklist${isRows?' rows':''}`}>{g.items.map(t=><TaskItem key={t.id} task={t} vibrant={vibrant} dark={dark} mono={mono} subtaskMode={subtaskMode} selected={selectedIds?.has(t.id)} bulkMode={bulkMode} {...taskHandlers}/>)}</div></div>)}</div>;
}

function blankTask(){return{id:null,title:'',notes:'',categoryId:CATEGORIES.find(c=>!c.parentId)?.id||'work',priority:'med',due:TODAY_STR,recurring:'none',done:false,subtasks:[],attachments:[]};}

          {kids.map(sc=><button key={sc.id} className={`opt${t.categoryId===sc.id?' on':''}`} onClick={()=>set('categoryId',sc.id)} style={{paddingLeft:10,fontSize:12.5}}><span style={{width:10,display:'inline-block'}}/><span className="cat-dot" style={{background:catDotColor(sc,vibrant),width:7,height:7}}/>{sc.name}</button>)}

    <div className="field"><label className="field-label">Attachments</label><div className="attach-list">{t.attachments.map(a=><div key={a.id} className="attach"><AttachIcon type={a.type}/><div style={{flex:1,minWidth:0}}>{a.type==='link'?<a className="attach-name" href={/^https?:\/\//.test(a.name)?a.name:'https://'+a.name} target="_blank" rel="noopener noreferrer" style={{color:'var(--green)',textDecoration:'underline'}}>{a.name}</a>:<div className="attach-name">{a.name}</div>}<div className="attach-meta">{a.meta}</div></div><button className="mini-btn" onClick={()=>delAttach(a.id)}><Icon name="x" size={15}/></button></div>)}{attachType?<div className="sub-edit"><AttachIcon type={attachType}/><input autoFocus value={attachVal} placeholder={attachType==='link'?'Paste a URL…':attachType==='image'?'Image file name…':'File name…'} onChange={e=>setAttachVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addAttach();if(e.key==='Escape'){setAttachType(null);setAttachVal('');}}} onBlur={addAttach}/></div>:<div className="add-attach-row"><button className="opt" onClick={()=>setAttachType('file')}><Icon name="file" size={15}/>File</button><button className="opt" onClick={()=>setAttachType('link')}><Icon name="link" size={15}/>Link</button><button className="opt" onClick={()=>setAttachType('image')}><Icon name="image" size={15}/>Image</button></div>}</div></div>
  </div>

/* ---- CategoryManager ---- */
const CAT_COLOR_PRESETS=['#7B8FD4','#C87DB0','#5ABD8C','#C4A832','#5AAFC0','#E0836A','#A67BC8','#6BBD6B','#D4896A','#7BBDD4'];

function isValidHex(h){return/^#[0-9a-fA-F]{6}$/.test(h);}

function CatRow({c,isChild,pickingFor,setPickingFor,update,remove,addChild,topLevelCount}){
  const[hexInput,setHexInput]=React.useState(c.hex||'#888888');
  React.useEffect(()=>setHexInput(c.hex||'#888888'),[c.hex]);
  const color=c.hex||`oklch(0.72 ${c.c||0.12} ${c.h||220})`;
  const applyHex=h=>{if(isValidHex(h)){update(c.id,{hex:h});}};
  return<div>
    <div className={`cat-edit-row${isChild?' subcat-indent':''}`}>
      <button className="cat-color-btn" style={{background:color,outline:pickingFor===c.id?'2px solid var(--ink)':'2px solid transparent',outlineOffset:2}} onClick={()=>setPickingFor(pickingFor===c.id?null:c.id)} title="Change colour"/>
      <input className="input" value={c.name} onChange={e=>update(c.id,{name:e.target.value})} style={{flex:1,padding:'8px 11px',fontSize:14}}/>
      {!isChild&&<button className="mini-btn" title="Add sub-category" onClick={()=>addChild(c.id)} style={{opacity:.7}}><Icon name="plus" size={14}/></button>}
      <button className="mini-btn" onClick={()=>remove(c.id)} style={{opacity:topLevelCount<=1&&!isChild?.3:1}} disabled={topLevelCount<=1&&!isChild} title="Delete"><Icon name="trash" size={14}/></button>
    </div>
    {pickingFor===c.id&&<div className={`color-picker-row${isChild?' subcat-indent':''}`}>
      <input type="color" value={isValidHex(hexInput)?hexInput:'#888888'} onChange={e=>{setHexInput(e.target.value);applyHex(e.target.value);}}/>
      <input className="hex-input" value={hexInput} placeholder="#000000" maxLength={7}
        onChange={e=>{const v=e.target.value;setHexInput(v);if(isValidHex(v))update(c.id,{hex:v});}}
        onBlur={e=>{if(!isValidHex(e.target.value))setHexInput(c.hex||'#888888');}}/>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {CAT_COLOR_PRESETS.map(p=><button key={p} onClick={()=>{update(c.id,{hex:p});setHexInput(p);setPickingFor(null);}} style={{width:20,height:20,borderRadius:5,background:p,border:c.hex===p?'2px solid var(--ink)':'2px solid transparent',cursor:'pointer'}}/>)}
      </div>
    </div>}
  </div>;
}

function CategoryManager({categories,onSave,onClose}){
  const[cats,setCats]=React.useState(()=>categories.map(c=>({...c})));
  const[pickingFor,setPickingFor]=React.useState(null);
  const add=(parentId=null)=>{
    const usedHex=new Set(cats.map(c=>c.hex));
    const hex=CAT_COLOR_PRESETS.find(p=>!usedHex.has(p))||CAT_COLOR_PRESETS[cats.length%CAT_COLOR_PRESETS.length];
    const parentCat=parentId?cats.find(c=>c.id===parentId):null;
    setCats(prev=>[...prev,{id:'cat_'+Date.now(),name:'New '+(parentId?'Sub-':'')+'Category',parentId,hex:parentCat?parentCat.hex:hex,h:220,c:0.12}]);
  };
  const update=(id,patch)=>setCats(prev=>prev.map(c=>c.id===id?{...c,...patch}:c));
  const remove=id=>{setCats(prev=>prev.filter(c=>c.id!==id&&c.parentId!==id));if(pickingFor===id)setPickingFor(null);};
  const save=()=>{const valid=cats.filter(c=>c.name.trim());if(valid.length===0)return;onSave(valid);};
  const topLevel=cats.filter(c=>!c.parentId);
  const children=id=>cats.filter(c=>c.parentId===id);
  return<Modal onClose={onClose}><div className="modal-head"><h3>Manage Categories</h3><button className="mini-btn" onClick={onClose}><Icon name="x" size={18}/></button></div>
  <div className="modal-body scroll" style={{overflowY:'auto',gap:0}}>
    <p style={{fontSize:13,color:'var(--ink-3)',marginBottom:14}}>Click the colour dot to pick a colour or enter a hex code. Use <strong>+</strong> to add a sub-category.</p>
    <div style={{display:'flex',flexDirection:'column'}}>
      {topLevel.map(c=><React.Fragment key={c.id}>
        <CatRow c={c} isChild={false} pickingFor={pickingFor} setPickingFor={setPickingFor} update={update} remove={remove} addChild={add} topLevelCount={topLevel.length}/>
        {children(c.id).map(sc=><CatRow key={sc.id} c={sc} isChild={true} pickingFor={pickingFor} setPickingFor={setPickingFor} update={update} remove={remove} addChild={add} topLevelCount={topLevel.length}/>)}
      </React.Fragment>)}
    </div>
    <button className="btn btn-ghost" style={{marginTop:14,width:'100%',justifyContent:'center'}} onClick={()=>add(null)}><Icon name="plus" size={16}/>Add category</button>
  </div>
  <div className="modal-foot"><span/><div style={{display:'flex',gap:10}}><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={save}><Icon name="check" size={16}/>Save</button></div></div></Modal>;
}

    google:{label:'Google',icon:<svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>},
    apple:{label:'Apple',icon:<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.32.07 2.24.74 3.01.8 1.15-.24 2.25-.93 3.47-.84 1.48.13 2.59.73 3.32 1.85-3.03 1.85-2.32 5.91.22 7.07-.52 1.37-1.2 2.72-2.02 4zm-3.2-17.3c.07 2.01-1.81 3.68-3.73 3.51-.27-1.9 1.68-3.67 3.73-3.51z"/></svg>},
  };
  const signInWithOAuth=async(provider)=>{
    if(!IS_SUPABASE){setErr('Supabase not configured.');return;}
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithOAuth({provider,options:{redirectTo:window.location.href}});
    if(error){setErr(error.message);setLoading(false);}
  };
  const submit=async()=>{
    if(!IS_SUPABASE){setErr('Supabase not configured.');return;}
    if(!email||!password)return;
    setLoading(true);setErr('');
    if(mode==='signin'){
      const{error}=await sb.auth.signInWithPassword({email,password});
      if(error)setErr(error.message);
    }else{
      const{error}=await sb.auth.signUp({email,password});
      if(error){setErr(error.message);}
      else{
        if(nameVal.trim()){await sb.auth.updateUser({data:{display_name:nameVal.trim()}});onSave(nameVal.trim());}
        setErr('Check your email to confirm your account, then sign in.');
      }
    }
    setLoading(false);
  };
  const saveName=async()=>{
    const n=nameVal.trim();
    onSave(n);
    if(IS_SUPABASE&&session)await sb.auth.updateUser({data:{display_name:n}});
    onClose();
  };
  const SQL_SETUP=`create table if not exists user_data (\n  user_id uuid primary key references auth.users on delete cascade,\n  tasks jsonb not null default '[]',\n  categories jsonb not null default '[]',\n  updated_at timestamptz not null default now()\n);\nalter table user_data enable row level security;\ncreate policy "own data" on user_data for all\n  using (auth.uid() = user_id)\n  with check (auth.uid() = user_id);`;
  return<Modal onClose={onClose}>
    <div className="modal-head"><h3>{isLoggedIn?'Account':'Sign in to sync'}</h3><button className="mini-btn" onClick={onClose}><Icon name="x" size={18}/></button></div>
    <div className="modal-body scroll" style={{overflowY:'auto'}}>
      {isLoggedIn?<React.Fragment>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'4px 0 16px'}}>
          <div className="avatar logged-in" style={{width:44,height:44,fontSize:16,cursor:'default'}}>{nameVal?nameVal.slice(0,2).toUpperCase():'WP'}</div>
          <div><div style={{fontWeight:650,fontSize:15}}>{nameVal||'Work Planner'}</div><div style={{fontSize:12.5,color:'var(--ink-3)',marginTop:2}}>{session.user.email}</div></div>
        </div>
        <div className="field"><label className="field-label">Display name</label>
          <input className="input" value={nameVal} placeholder="Your name" onChange={e=>setNameVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveName()}/>
        </div>
      </React.Fragment>:<React.Fragment>
        {IS_SUPABASE&&providers.length>0&&<React.Fragment>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {providers.map(p=><button key={p} className="oauth-btn" onClick={()=>signInWithOAuth(p)} disabled={loading}>

            </button>)}
          </div>
          <div className="oauth-divider">or</div>
        </React.Fragment>}

        {!IS_SUPABASE&&<div className="login-err" style={{marginBottom:12}}>Supabase not configured — app is running in local-only mode.</div>}
        {mode==='signup'&&<div className="field"><label className="field-label">Display name (optional)</label>
          <input className="input" value={nameVal} placeholder="Your name" onChange={e=>setNameVal(e.target.value)}/>
        </div>}
        <div className="field"><label className="field-label">Email</label><input className="input" type="email" autoCapitalize="off" autoCorrect="off" value={email} placeholder="you@example.com" onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        <div className="field"><label className="field-label">Password</label><input className="input" type="password" value={password} placeholder="••••••••" onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        <div className="login-footer" style={{textAlign:'right'}}>{mode==='signin'?<>No account? <button onClick={()=>setMode('signup')}>Create one</button></>:<>Have an account? <button onClick={()=>setMode('signin')}>Sign in</button></>}</div>
        <details style={{marginTop:4}}><summary style={{fontSize:12,color:'var(--ink-3)',cursor:'pointer'}}>First-time setup: SQL to run in Supabase</summary><div className="setup-box" style={{marginTop:10}}><pre style={{fontSize:11,whiteSpace:'pre-wrap',fontFamily:'ui-monospace,monospace'}}>{SQL_SETUP}</pre></div></details>
      </React.Fragment>}
    </div>
    <div className="modal-foot">
      {isLoggedIn
        ?<button className="btn btn-ghost" style={{color:'var(--red-ink)'}} onClick={()=>{onSignOut();onClose();}}><Icon name="logout" size={16}/>Sign out</button>
        :<span/>}
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        {isLoggedIn
          ?<button className="btn btn-primary" onClick={saveName}><Icon name="check" size={16}/>Save</button>
          :<button className="btn btn-primary" onClick={submit} disabled={loading||!IS_SUPABASE}>{loading?'Signing in…':mode==='signin'?'Sign in':'Create account'}</button>}
      </div>
    </div>
  </Modal>;
}

/* ---- UndoToast ---- */
function UndoToast({task,onUndo,onDismiss}){
  if(!task)return null;
  return<div className="toast"><span>Task deleted</span><button className="toast-undo" onClick={onUndo}>Undo</button><button className="toast-x" onClick={onDismiss}>✕</button></div>;
}

/* ---- EisenhowerView ---- */
function EisenhowerView({tasks,onEdit,vibrant,dark,mono}){
  const active=tasks.filter(t=>!taskDone(t));
  const urgent=t=>{const b=bucketOf(t);return b==='overdue'||b==='today';};
  const important=t=>t.priority==='high'||t.priority==='med';
  const quads=[
    {title:'Do First',sub:'Urgent + Important',color:'var(--red-soft)',items:active.filter(t=>urgent(t)&&important(t))},
    {title:'Schedule',sub:'Important, Not Urgent',color:'var(--green-soft)',items:active.filter(t=>!urgent(t)&&important(t))},
    {title:'Delegate',sub:'Urgent, Not Important',color:'var(--amber-soft)',items:active.filter(t=>urgent(t)&&!important(t))},
    {title:'Eliminate',sub:'Not Urgent, Not Important',color:'var(--surface-2)',items:active.filter(t=>!urgent(t)&&!important(t))},
  ];
  return<div className="matrix">{quads.map(q=><div key={q.title} className="matrix-quad">
    <div className="matrix-quad-head" style={{background:q.color}}>
      <div className="matrix-quad-title">{q.title}</div>
      <div className="matrix-quad-sub">{q.sub} · {q.items.length}</div>
    </div>
    <div className="matrix-items">
      {q.items.length===0?<div className="matrix-empty">Nothing here</div>:q.items.map(t=><button key={t.id} className="matrix-task" onClick={()=>onEdit(t.id)}>
        <PriorityTag p={t.priority}/><span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span><DateChip due={t.due} done={false}/>
      </button>)}
    </div>
  </div>)}</div>;
}

/* ---- WeeklyReview ---- */
function WeeklyReview({tasks,onEdit,vibrant,dark,mono}){
  const days=Array.from({length:7},(_,i)=>{const d=addDays(TODAY,-(6-i));const key=ymd(d);const due=tasks.filter(t=>t.due===key);return{key,d,done:due.filter(taskDone),missed:due.filter(t=>!taskDone(t))};});
  const totalDone=days.reduce((s,d)=>s+d.done.length,0);
  const totalMissed=days.reduce((s,d)=>s+d.missed.length,0);
  return<div>
    <div className="stats" style={{padding:'4px 0 18px',gridTemplateColumns:'repeat(2,1fr)',maxWidth:320}}>
      <div className="stat green"><div className="stat-num">{totalDone}</div><div className="stat-label">Completed</div></div>
      <div className="stat red"><div className="stat-num">{totalMissed}</div><div className="stat-label">Missed</div></div>
    </div>
    {days.map(({key,d,done,missed})=><div key={key} className="review-day">
      <div className="review-day-head">
        <span className="review-day-label">{key===TODAY_STR?'Today':DOW[d.getDay()]}, {MON_SHORT[d.getMonth()]} {d.getDate()}</span>
        {done.length>0&&<span className="review-pill done">{done.length} done</span>}
        {missed.length>0&&<span className="review-pill miss">{missed.length} missed</span>}
      </div>
      {done.length===0&&missed.length===0&&<p style={{fontSize:12.5,color:'var(--ink-3)',paddingLeft:2}}>No tasks due</p>}
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {[...done,...missed].map(t=><button key={t.id} className={`task${taskDone(t)?' done':''}`} style={{width:'100%',textAlign:'left'}} onClick={()=>onEdit(t.id)}>
          <div className="task-main">
            <div className={`check${taskDone(t)?' on':''}`} style={{pointerEvents:'none',flexShrink:0}}><Icon name="check" size={13} strokeWidth={3}/></div>
            <div className="task-body"><span className="task-title" style={{fontSize:14}}>{t.title}</span><div className="meta-row"><CategoryChip cat={catById(t.categoryId)} vibrant={vibrant} dark={dark} mono={mono}/></div></div>
          </div>
        </button>)}
      </div>
    </div>)}
  </div>;
}

/* ---- PlannerSurface ---- */
const TAB_DEF=[{id:'today',label:'Today',icon:'today'},{id:'upcoming',label:'Upcoming',icon:'clock'},{id:'all',label:'All Tasks',icon:'list'},{id:'calendar',label:'Calendar',icon:'calendar'},{id:'matrix',label:'Matrix',icon:'matrix'},{id:'review',label:'Review',icon:'review'}];
const LS_SETTINGS='wp_settings';
const LS_DARK='wp_dark';
const DEFAULT_SETTINGS={defaultTab:'all',tabOrder:['all','calendar','today','upcoming'],theme:'soft',listLayout:'cards',accent:'#708871',subtaskMode:'collapsible',calendarDefault:'month',notificationsEnabled:false};
const CAL_VIEWS=[{id:'month',label:'Month',icon:'grid'},{id:'agenda',label:'Agenda',icon:'agenda'},{id:'timeline',label:'Timeline',icon:'timeline'}];
const matchSearch=(t,q)=>{if(!q)return true;q=q.toLowerCase();return t.title.toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q)||(t.subtasks||[]).some(s=>s.title.toLowerCase().includes(q));};

function PlannerSurface({formFactor,tasks,dark,streak,undoTask,syncStatus,session,displayName,showAuth,setShowAuth,setDisplayName,settings,saveSettings,root}){
  const mobile=formFactor==='mobile';
  const accent=settings.accent||'#708871';
  const theme=settings.theme||'soft';
  const listLayout=settings.listLayout||'cards';
  const subtaskMode=settings.subtaskMode||'collapsible';
  const calendarDefault=settings.calendarDefault||'month';
  const vibrant=theme==='vibrant';const mono=theme==='mono';
  const[tab,setTab]=React.useState(()=>settings.defaultTab||'all');
  const[showSettings,setShowSettings]=React.useState(false);const[catFilter,setCatFilter]=React.useState(null);const[search,setSearch]=React.useState('');const[sort,setSort]=React.useState('due');const[hideDone,setHideDone]=React.useState(false);const[calView,setCalView]=React.useState(calendarDefault);const[monthDate,setMonthDate]=React.useState(new Date(TODAY.getFullYear(),TODAY.getMonth(),1));const[selDay,setSelDay]=React.useState(TODAY_STR);const[editId,setEditId]=React.useState(undefined);const[showCatMgr,setShowCatMgr]=React.useState(false);const[expandedCats,setExpandedCats]=React.useState({});
  const[selectedIds,setSelectedIds]=React.useState(new Set());const[bulkMode,setBulkMode]=React.useState(false);
  React.useEffect(()=>{setCalView(calendarDefault);},[calendarDefault]);
  const toggleSelect=id=>setSelectedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const clearBulk=()=>{setSelectedIds(new Set());setBulkMode(false);};

  // filter: if catFilter is a parent, include all its children too
  const filterIds=catFilter?catAllIds(catFilter):null;
  const base=tasks.filter(x=>(!filterIds||filterIds.includes(x.categoryId))&&matchSearch(x,search));
  let listTasks=base;
  if(tab==='today')listTasks=base.filter(x=>['overdue','today'].includes(bucketOf(x)));
  else if(tab==='upcoming')listTasks=base.filter(x=>['week','later','nodate'].includes(bucketOf(x))&&!taskDone(x));
  else if(tab==='all'&&hideDone)listTasks=base.filter(x=>!taskDone(x));

  const cnt={today:tasks.filter(x=>['overdue','today'].includes(bucketOf(x))).length,upcoming:tasks.filter(x=>['week','later','nodate'].includes(bucketOf(x))&&!taskDone(x)).length,all:tasks.length};
  const stats={today:tasks.filter(x=>bucketOf(x)==='today').length,overdue:tasks.filter(x=>bucketOf(x)==='overdue').length,week:tasks.filter(x=>bucketOf(x)==='week').length,done:tasks.filter(x=>taskDone(x)).length};
  const todoCount=tasks.filter(t=>!taskDone(t)&&taskProgress(t)===0).length;
  const inProgressCount=tasks.filter(t=>!taskDone(t)&&taskProgress(t)>0).length;
  const doneCount=tasks.filter(taskDone).length;
  const handlers={onToggleTask:root.toggleTask,onToggleSub:root.toggleSub,onAddSub:root.addSub,onEdit:id=>setEditId(id),onDelete:root.deleteTask,onDuplicate:root.duplicateTask,onSelect:toggleSelect,selectedIds,bulkMode};
  const titles={today:['Today',`${WD_FULL[TODAY.getDay()]}, ${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}`],upcoming:['Upcoming','Tasks with a future due date'],all:['All Tasks',`${tasks.length} tasks · ${stats.done} completed`],calendar:['Calendar',`${MONTHS[monthDate.getMonth()]} ${monthDate.getFullYear()}`],matrix:['Matrix','Eisenhower prioritisation'],review:['Weekly Review','Last 7 days']};

  const toggleExpand=id=>setExpandedCats(prev=>({...prev,[id]:!prev[id]}));

  // sidebar category tree
  const topLevelCats=CATEGORIES.filter(c=>!c.parentId);

  function SidebarCats(){
    return topLevelCats.map(c=>{
      const kids=catChildren(c.id);
      const hasKids=kids.length>0;
      const expanded=!!expandedCats[c.id];
      const nAll=tasks.filter(x=>catAllIds(c.id).includes(x.categoryId)&&!taskDone(x)).length;
      const nSubs=hasKids&&!expanded?kids.reduce((s,sc)=>s+tasks.filter(x=>x.categoryId===sc.id&&!taskDone(x)).length,0):0;
      const isActive=catFilter===c.id;
      return<React.Fragment key={c.id}>
        <div className={`cat-row-wrap${isActive?' active':''}`}>
          {hasKids
            ?<button className="cat-chevron-btn" onClick={()=>toggleExpand(c.id)} title={expanded?'Collapse':'Expand'}>
                <Icon name="chevronR" size={13} style={{transform:expanded?'rotate(90deg)':'none',transition:'transform .15s'}}/>
              </button>
            :<span style={{width:24,flexShrink:0}}/>}
          <button className="cat-row-btn" onClick={()=>setCatFilter(isActive?null:c.id)}>
            <span className="cat-dot" style={{background:catDotColor(c,vibrant,mono)}}/>
            {c.name}
            <span className="count">{nAll}</span>
            {hasKids&&!expanded&&nSubs>0&&<span className="sub-badge">{nSubs} pending</span>}
          </button>
        </div>

          const nSc=tasks.filter(x=>x.categoryId===sc.id&&!taskDone(x)).length;
          return<button key={sc.id} className={`subcat-row${catFilter===sc.id?' active':''}`} onClick={()=>setCatFilter(catFilter===sc.id?null:sc.id)}>
            <span className="cat-dot" style={{background:catDotColor(sc,vibrant,mono),width:8,height:8}}/>

          </button>;
        })}
      </React.Fragment>;
    });
  }

  function CalendarBlock(){return<div>{!mobile&&<div className="cal-head">{calView==='month'&&<React.Fragment><div className="cal-month">{MONTHS[monthDate.getMonth()]} {monthDate.getFullYear()}</div><div className="cal-nav"><button className="icon-btn" onClick={()=>setMonthDate(new Date(monthDate.getFullYear(),monthDate.getMonth()-1,1))}><Icon name="chevronL" size={18}/></button><button className="icon-btn" onClick={()=>setMonthDate(new Date(monthDate.getFullYear(),monthDate.getMonth()+1,1))}><Icon name="chevronR" size={18}/></button><button className="btn btn-ghost" onClick={()=>setMonthDate(new Date(TODAY.getFullYear(),TODAY.getMonth(),1))}>Today</button></div></React.Fragment>}<div className="topbar-spacer"/><Segmented options={CAL_VIEWS} value={calView} onChange={setCalView}/></div>}{mobile&&<div style={{display:'flex',gap:8,padding:'0 0 12px',alignItems:'center'}}><Segmented options={CAL_VIEWS} value={calView} onChange={setCalView}/>{calView==='month'&&<div className="cal-nav" style={{marginLeft:'auto'}}><button className="icon-btn" style={{width:34,height:34}} onClick={()=>setMonthDate(new Date(monthDate.getFullYear(),monthDate.getMonth()-1,1))}><Icon name="chevronL" size={16}/></button><button className="icon-btn" style={{width:34,height:34}} onClick={()=>setMonthDate(new Date(monthDate.getFullYear(),monthDate.getMonth()+1,1))}><Icon name="chevronR" size={16}/></button></div>}</div>}{calView==='month'&&<MonthGrid tasks={base} monthDate={monthDate} onEdit={handlers.onEdit} vibrant={vibrant} mono={mono} mobile={mobile} selected={selDay} setSelected={setSelDay}/>}{calView==='month'&&mobile&&<MobileDayList tasks={base} day={selDay} onEdit={handlers.onEdit} vibrant={vibrant} dark={dark} mono={mono}/>}{calView==='agenda'&&<AgendaView tasks={base} onEdit={handlers.onEdit} vibrant={vibrant} dark={dark} mono={mono}/>}{calView==='timeline'&&<TimelineView tasks={base} onEdit={handlers.onEdit} vibrant={vibrant} dark={dark} mono={mono} mobile={mobile}/>}</div>;}

  const syncLabel=syncStatus==='busy'?'Syncing…':syncStatus==='ok'?'Synced':IS_SUPABASE&&session?'Offline':'Local only';
  const initials=displayName?displayName.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase():session?'●':'WP';

  const editor=editId!==undefined&&<TaskEditor initial={editId===null?null:tasks.find(x=>x.id===editId)} vibrant={vibrant} dark={dark} onSave={task=>{root.saveTask(task);setEditId(undefined);}} onClose={()=>setEditId(undefined)} onDelete={id=>{root.deleteTask(id);setEditId(undefined);}}/>;
  const catMgr=showCatMgr&&<CategoryManager categories={CATEGORIES} onSave={c=>{root.saveCategories(c);setShowCatMgr(false);}} onClose={()=>setShowCatMgr(false)}/>;
  const authModal=showAuth&&<AuthModal session={session} displayName={displayName} onSave={setDisplayName} onSignOut={root.signOut} onClose={()=>setShowAuth(false)}/>;
  const settingsModal=showSettings&&<SettingsModal settings={settings} onSave={saveSettings} onClose={()=>setShowSettings(false)} onExport={fmt=>fmt==='json'?exportJSON(tasks,CATEGORIES):exportCSV(tasks,CATEGORIES)}/>;
  const orderedTabs=settings.tabOrder.map(id=>TAB_DEF.find(d=>d.id===id)).filter(Boolean);
  const isListTab=!['calendar','matrix','review'].includes(tab);
  const BulkBar=bulkMode&&selectedIds.size>0&&<div className="bulk-bar"><span className="bulk-count">{selectedIds.size} selected</span><button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:13}} onClick={()=>{[...selectedIds].forEach(id=>root.toggleTask(id));clearBulk();}}>Complete all</button><button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:13,color:'var(--red-ink)'}} onClick={()=>{[...selectedIds].forEach(id=>root.deleteTask(id));clearBulk();}}>Delete all</button><button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:13}} onClick={clearBulk}>Cancel</button></div>;

  const MainContent=()=>{

    if(tab==='review')return<WeeklyReview tasks={tasks} onEdit={handlers.onEdit} vibrant={vibrant} dark={dark} mono={mono}/>;
    return<TaskList tasks={listTasks} layout={listLayout} sort={sort} vibrant={vibrant} dark={dark} mono={mono} subtaskMode={subtaskMode} handlers={handlers}/>;
  };

  if(!mobile)return<div className={`surface desktop${dark?' dark':''}`} style={{'--accent':accent}}>
    <aside className="sidebar">
      {/* Profile card */}
      <div className="profile-card">
        <button className={`sidebar-avatar${session?' logged-in':''}`} title={session?'Account':'Sign in'} onClick={()=>setShowAuth(true)}>{initials}</button>
        <div style={{flex:1,minWidth:0}}>
          <div className="profile-name">{displayName||'Work Planner'}</div>
          <div className="profile-sub"><span className={`sync-dot ${syncStatus}`}/>{syncLabel}</div>
